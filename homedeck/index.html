<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>HomeDeck</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg:       'var(--bg)',
              surface:  'var(--surface)',
              raised:   'var(--surface-raised)',
              primary:  'var(--primary)',
              success:  'var(--success)',
              warning:  'var(--warning)',
              error:    'var(--error)',
              text:     'var(--text)',
              muted:    'var(--text-secondary)',
              border:   'var(--border)',
            },
            borderRadius: {
              card: 'var(--radius)',
              sm:   'var(--radius-sm)',
              xs:   'var(--radius-xs)',
            },
            boxShadow: {
              app:  'var(--shadow)',
              hover:'var(--shadow-hover)',
              card: 'var(--shadow-card)',
            },
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="app" class="flex flex-col h-screen overflow-hidden">

      <header class="flex justify-between items-center px-6 py-3 bg-surface border-b border-border shadow-app flex-shrink-0">
        <div class="flex flex-col gap-0.5">
          <div id="clock" class="text-[2.6rem] font-bold tracking-[-2px] text-text leading-none">--:--</div>
          <div id="date" class="text-[0.88rem] text-muted tracking-[0.2px]">Loading…</div>
        </div>

        <div class="flex gap-2.5 items-center">
          <div class="flex items-center gap-[7px] py-[7px] px-[14px] bg-bg rounded-full border border-border">
            <span class="status-dot checking" id="internet-dot"></span>
            <span class="text-[0.82rem] text-muted font-medium whitespace-nowrap">Internet</span>
          </div>
          <div class="flex items-center gap-[7px] py-[7px] px-[14px] bg-bg rounded-full border border-border">
            <span class="status-dot checking" id="local-dot"></span>
            <span class="text-[0.82rem] text-muted font-medium whitespace-nowrap" id="local-label">Local</span>
          </div>
          <button
            class="w-11 h-11 border border-border bg-bg rounded-sm cursor-pointer flex items-center justify-center transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
            onclick="window.location.href = 'apps/settings/index.html'"
            title="Settings">
            <img src="assets/icons/settings.svg" width="18" height="18" alt="" />
          </button>
        </div>
      </header>

      <main class="flex-1 p-4 flex flex-col gap-4 overflow-hidden min-h-0">
        <!-- Rows are populated by applyCardLayout() in app.js -->
        <div class="flex gap-4 flex-[2] min-h-0" id="row-top"></div>
        <div class="flex gap-4 flex-[1] min-h-0 max-h-[160px]" id="row-bottom"></div>
      </main>

    </div>

    <!-- Card pool: all cards live here, JS moves them into row-top / row-bottom -->
    <div id="card-pool" style="display:none">

      <div class="card bg-surface rounded-card shadow-card border border-transparent hover:-translate-y-[3px] hover:shadow-hover hover:border-border active:scale-[0.97] transition-[transform,box-shadow,border-color] duration-[180ms] cursor-pointer p-5 flex flex-col min-w-0"
           id="card-weather" onclick="openApp('weather')">
        <div class="text-[0.72rem] font-bold text-muted uppercase tracking-[0.7px]">Weather</div>
        <div class="flex-1 flex items-center justify-between min-h-0">
          <div class="flex flex-col gap-2">
            <div class="text-[3.8rem] font-bold text-text leading-none" id="weather-temp">--°</div>
            <div class="text-[1rem] text-muted font-medium" id="weather-cond">Loading…</div>
            <div class="flex items-center gap-1.5 text-[0.85rem] text-muted mt-1" id="weather-loc" style="display:none">
              <img src="assets/icons/pin.svg" width="13" height="13" alt="" />
              <span id="weather-loc-text"></span>
            </div>
          </div>
          <div id="weather-icon" class="flex items-center justify-center pr-2 flex-shrink-0"></div>
        </div>
      </div>

      <div class="card bg-surface rounded-card shadow-card border border-transparent hover:-translate-y-[3px] hover:shadow-hover hover:border-border active:scale-[0.97] transition-[transform,box-shadow,border-color] duration-[180ms] cursor-pointer p-5 flex flex-col min-w-0"
           id="card-server" onclick="openApp('server')">
        <div class="flex justify-between items-center flex-shrink-0">
          <div class="text-[0.72rem] font-bold text-muted uppercase tracking-[0.7px]">System</div>
          <span class="text-muted text-[1.1rem] leading-none">›</span>
        </div>
        <div class="flex-1 flex flex-col justify-center gap-3 min-h-0">
          <div class="flex items-center gap-2">
            <img src="assets/icons/monitor.svg" width="14" height="14" alt="" class="flex-shrink-0 opacity-50" />
            <span class="text-[0.72rem] font-bold text-muted uppercase w-8">CPU</span>
            <span class="text-[0.82rem] font-bold text-text w-11 text-right" id="sys-cpu-val">--%</span>
            <div class="flex-1 h-2 bg-border rounded-full overflow-hidden">
              <div id="sys-cpu-bar" class="h-full rounded-full bg-success transition-[width] duration-700" style="width:0%"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <img src="assets/icons/hardrive.svg" width="14" height="14" alt="" class="flex-shrink-0 opacity-50" />
            <span class="text-[0.72rem] font-bold text-muted uppercase w-8">RAM</span>
            <span class="text-[0.82rem] font-bold text-text w-11 text-right" id="sys-ram-val">--%</span>
            <div class="flex-1 h-2 bg-border rounded-full overflow-hidden">
              <div id="sys-ram-bar" class="h-full rounded-full bg-primary transition-[width] duration-700" style="width:0%"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <img src="assets/icons/thermometer.svg" width="14" height="14" alt="" class="flex-shrink-0 opacity-50" />
            <span class="text-[0.72rem] font-bold text-muted uppercase w-8">TEMP</span>
            <span class="text-[0.82rem] font-bold text-text w-11 text-right" id="sys-temp-val">--°C</span>
            <div class="flex-1 h-2 bg-border rounded-full overflow-hidden">
              <div id="sys-temp-bar" class="h-full rounded-full bg-primary transition-[width] duration-700" style="width:0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card bg-surface rounded-card shadow-card border border-transparent hover:-translate-y-[3px] hover:shadow-hover hover:border-border active:scale-[0.97] transition-[transform,box-shadow,border-color] duration-[180ms] cursor-pointer p-5 flex flex-col min-w-0"
           id="card-uptime" onclick="openApp('uptime')">
        <div class="text-[0.72rem] font-bold text-muted uppercase tracking-[0.7px]">Uptime Monitor</div>
        <div class="flex-1 flex items-center gap-3 min-h-0">
          <img id="uptime-status-icon" src="assets/icons/check_mark.svg" width="28" height="28" alt="" class="flex-shrink-0 opacity-70" />
          <div class="text-[1.9rem] font-bold text-text leading-none" id="uptime-value">-- / --</div>
        </div>
        <div class="text-[0.82rem] text-muted flex-shrink-0" id="uptime-sub">Services Online</div>
      </div>

      <div class="card bg-surface rounded-card shadow-card border border-transparent hover:-translate-y-[3px] hover:shadow-hover hover:border-border active:scale-[0.97] transition-[transform,box-shadow,border-color] duration-[180ms] cursor-pointer p-5 flex flex-col min-w-0"
           id="card-ha" onclick="openApp('homeassistant')">
        <div class="text-[0.72rem] font-bold text-muted uppercase tracking-[0.7px]">Home Assistant</div>
        <div class="flex-1 flex items-center gap-3 min-h-0">
          <img src="assets/icons/house.svg" width="30" height="30" alt="" class="flex-shrink-0 opacity-70" />
          <div class="text-[1.9rem] font-bold text-text leading-none" id="ha-scenes-count">–</div>
        </div>
        <div class="text-[0.82rem] text-muted flex-shrink-0" id="ha-sub">Scenes Available</div>
      </div>

      <div class="card bg-surface rounded-card shadow-card border border-transparent hover:-translate-y-[3px] hover:shadow-hover hover:border-border active:scale-[0.97] transition-[transform,box-shadow,border-color] duration-[180ms] cursor-pointer p-5 flex flex-col min-w-0"
           id="card-stocks" onclick="openApp('stocks')">
        <div class="flex items-center gap-1.5 text-[0.72rem] font-bold text-muted uppercase tracking-[0.7px] flex-shrink-0">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1 7.5L4 4.5L6 6.5L10 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Stocks
        </div>
        <div class="flex-1 flex flex-col justify-center gap-1 min-h-0" id="stocks-list">
          <div class="text-[0.82rem] text-muted">No stocks</div>
        </div>
      </div>

      <div class="card bg-surface rounded-card shadow-card border border-transparent hover:-translate-y-[3px] hover:shadow-hover hover:border-border active:scale-[0.97] transition-[transform,box-shadow,border-color] duration-[180ms] cursor-pointer p-5 flex flex-col min-w-0"
           id="card-network" onclick="openApp('network')">
        <div class="flex justify-between items-center flex-shrink-0">
          <div class="flex items-center gap-1.5 text-[0.72rem] font-bold text-muted uppercase tracking-[0.7px]">
            <svg width="14" height="11" viewBox="0 0 20 16" fill="none">
              <path d="M1 5C5.5 0.5 14.5 0.5 19 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M3.5 8C6.5 5 13.5 5 16.5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M6.5 11C8 9.5 12 9.5 13.5 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="10" cy="14.5" r="1.5" fill="currentColor"/>
            </svg>
            Network
          </div>
          <span class="text-muted text-[1.1rem] leading-none">›</span>
        </div>
        <div class="flex-1 flex items-center min-h-0">
          <div class="text-[1.9rem] font-bold text-text leading-none" id="network-devices">--</div>
        </div>
        <div class="text-[0.82rem] text-muted flex-shrink-0">Devices</div>
      </div>

    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
