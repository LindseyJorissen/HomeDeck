<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>HomeDeck</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg:       'var(--bg)',
              surface:  'var(--surface)',
              raised:   'var(--surface-raised)',
              primary:  'var(--primary)',
              success:  'var(--success)',
              warning:  'var(--warning)',
              error:    'var(--error)',
              text:     'var(--text)',
              muted:    'var(--text-secondary)',
              border:   'var(--border)',
            },
            borderRadius: {
              card: 'var(--radius)',
              sm:   'var(--radius-sm)',
              xs:   'var(--radius-xs)',
            },
            boxShadow: {
              app:  'var(--shadow)',
              hover:'var(--shadow-hover)',
              card: 'var(--shadow-card)',
            },
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="app">

      <header class="flex justify-between items-center px-8 py-[10px] bg-surface sticky top-0 z-10 border-b border-border shadow-app">
        <div class="flex flex-col gap-0.5">
          <div id="clock" class="text-[2.6rem] font-bold tracking-[-2px] text-text leading-none">--:--</div>
          <div id="date" class="text-[0.88rem] text-muted tracking-[0.2px]">Loading…</div>
        </div>

        <div class="flex gap-2.5 items-center">
          <div class="flex items-center gap-[7px] py-[7px] px-[14px] bg-bg rounded-full border border-border">
            <span class="status-dot checking" id="internet-dot"></span>
            <span class="text-[0.82rem] text-muted font-medium whitespace-nowrap">Internet</span>
          </div>
          <div class="flex items-center gap-[7px] py-[7px] px-[14px] bg-bg rounded-full border border-border">
            <span class="status-dot checking" id="local-dot"></span>
            <span class="text-[0.82rem] text-muted font-medium whitespace-nowrap" id="local-label">Local</span>
          </div>
          <button
            class="w-11 h-11 border border-border bg-bg rounded-sm cursor-pointer flex items-center justify-center transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
            onclick="window.location.href = 'apps/settings/index.html'"
            title="Settings">
            <img src="assets/icons/settings.svg" width="18" height="18" alt="" />
          </button>
        </div>
      </header>

      <main class="pt-4 px-5 pb-2 min-h-[calc(100vh-80px)] overflow-y-auto">
        <div id="card-grid" class="grid grid-cols-[repeat(auto-fill,minmax(210px,1fr))] gap-4 max-w-[1300px] mx-auto">

          <div class="card bg-surface rounded-card p-[22px] pb-5 shadow-card cursor-pointer flex flex-col gap-1.5 min-h-[140px] relative overflow-hidden border border-transparent hover:-translate-y-[5px] hover:shadow-hover hover:border-border active:scale-[0.965] active:shadow-app transition-[transform,box-shadow,border-color] duration-[180ms]"
               id="card-weather" onclick="openApp('weather')">
            <div class="text-[0.78rem] font-bold text-muted uppercase tracking-[0.7px]">Weather</div>
            <div class="flex items-center gap-3 flex-1">
              <div class="flex flex-col gap-1">
                <div class="text-[2.4rem] font-bold text-text leading-none" id="weather-temp">--°</div>
                <div class="text-[0.82rem] text-muted" id="weather-cond">Loading…</div>
              </div>
              <div id="weather-icon" class="flex-1 flex justify-center items-center pb-4"></div>
            </div>
          </div>

          <div class="card bg-surface rounded-card p-[22px] pb-5 shadow-card cursor-pointer flex flex-col gap-1.5 min-h-[140px] relative overflow-hidden border border-transparent hover:-translate-y-[5px] hover:shadow-hover hover:border-border active:scale-[0.965] active:shadow-app transition-[transform,box-shadow,border-color] duration-[180ms]"
               id="card-uptime" onclick="openApp('uptime')">
            <div class="text-[0.78rem] font-bold text-muted uppercase tracking-[0.7px]">Uptime Monitor</div>
            <div class="flex items-center gap-3 flex-1">
              <div class="flex flex-col gap-1">
                <div class="text-[2.4rem] font-bold text-text leading-none" id="uptime-value">-- / --</div>
                <div class="text-[0.82rem] text-muted" id="uptime-sub">Services Online</div>
              </div>
            </div>
          </div>

          <div class="card bg-surface rounded-card p-[22px] pb-5 shadow-card cursor-pointer flex flex-col gap-1.5 min-h-[140px] relative overflow-hidden border border-transparent hover:-translate-y-[5px] hover:shadow-hover hover:border-border active:scale-[0.965] active:shadow-app transition-[transform,box-shadow,border-color] duration-[180ms]"
               id="card-server" onclick="openApp('server')">
            <div class="text-[0.78rem] font-bold text-muted uppercase tracking-[0.7px]">System</div>
            <div class="flex items-center gap-3 flex-1">
              <div class="flex flex-col gap-1">
                <div class="text-[2.4rem] font-bold text-text leading-none" id="server-cpu">--%</div>
                <div class="text-[0.82rem] text-muted" id="server-sub">CPU Usage</div>
              </div>
            </div>
          </div>

          <div class="card bg-surface rounded-card p-[22px] pb-5 shadow-card cursor-pointer flex flex-col gap-1.5 min-h-[140px] relative overflow-hidden border border-transparent hover:-translate-y-[5px] hover:shadow-hover hover:border-border active:scale-[0.965] active:shadow-app transition-[transform,box-shadow,border-color] duration-[180ms]"
               id="card-ha" onclick="openApp('homeassistant')">
            <div class="text-[0.78rem] font-bold text-muted uppercase tracking-[0.7px]">Home Assistant</div>
            <div class="flex items-center gap-3 flex-1">
              <div class="flex flex-col gap-1">
                <div class="text-[2.4rem] font-bold text-text leading-none" id="ha-scenes-count">–</div>
                <div class="text-[0.82rem] text-muted" id="ha-sub">Favourite Scenes</div>
              </div>

            </div>
          </div>

        </div>
      </main>

    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
