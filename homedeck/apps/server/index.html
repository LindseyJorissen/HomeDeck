<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>System Monitor — HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      'var(--bg)',
            surface: 'var(--surface)',
            text:    'var(--text)',
            muted:   'var(--text-secondary)',
            border:  'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden">

    <header class="flex items-center px-6 py-[14px] bg-surface border-b border-border shadow-app gap-[14px] flex-shrink-0 z-10">
      <button class="w-11 h-11 min-w-[44px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.4rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <span class="text-[1.45rem] font-bold text-text flex items-center gap-2">
        <img src="../../assets/icons/monitor.svg" width="20" height="20" alt="" /> System Monitor
      </span>
      <button class="btn btn--secondary btn--sm ml-auto" onclick="load()" id="refresh-btn">↻</button>
    </header>

    <div class="flex-1 overflow-y-auto p-6">

      <div class="bg-surface rounded-sm p-5 mb-[14px] shadow-card border border-border slide-up" id="cpu-card" style="animation-delay:0.05s">
        <div class="flex items-center gap-4 mb-[14px]">
          <img src="../../assets/icons/cpu.svg" width="32" height="32" alt="" class="flex-shrink-0" />
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start">
              <div>
                <div class="text-[1rem] font-semibold">CPU</div>
                <div class="inline-flex items-center gap-1 text-[0.82rem] text-muted mt-1" id="cpu-temp"></div>
              </div>
              <div class="text-[2.2rem] font-bold leading-none" id="cpu-pct">--%</div>
            </div>
          </div>
        </div>
        <div class="w-full h-2 bg-bg rounded-full overflow-hidden">
          <div class="progress-fill progress-fill--primary" id="cpu-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="bg-surface rounded-sm p-5 mb-[14px] shadow-card border border-border slide-up" style="animation-delay:0.10s">
        <div class="flex items-center gap-4 mb-[14px]">
          <img src="../../assets/icons/monitor.svg" width="32" height="32" alt="" class="flex-shrink-0" />
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start">
              <div>
                <div class="text-[1rem] font-semibold">Memory</div>
                <div class="text-[0.82rem] text-muted mt-0.5" id="ram-detail">-- GB used of -- GB</div>
              </div>
              <div class="text-[2.2rem] font-bold leading-none" id="ram-pct">--%</div>
            </div>
          </div>
        </div>
        <div class="w-full h-2 bg-bg rounded-full overflow-hidden">
          <div class="progress-fill progress-fill--primary" id="ram-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="bg-surface rounded-sm p-5 mb-[14px] shadow-card border border-border slide-up" style="animation-delay:0.15s">
        <div class="flex items-center gap-4 mb-[14px]">
          <img src="../../assets/icons/hardrive.svg" width="32" height="32" alt="" class="flex-shrink-0" />
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start">
              <div>
                <div class="text-[1rem] font-semibold">Disk</div>
                <div class="text-[0.82rem] text-muted mt-0.5" id="disk-detail">-- GB used of -- GB</div>
              </div>
              <div class="text-[2.2rem] font-bold leading-none" id="disk-pct">--%</div>
            </div>
          </div>
        </div>
        <div class="w-full h-2 bg-bg rounded-full overflow-hidden">
          <div class="progress-fill progress-fill--success" id="disk-bar" style="width:0%"></div>
        </div>
      </div>


      <div class="text-[0.77rem] font-bold uppercase tracking-[0.8px] text-muted mb-3 mt-6">System Info</div>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-surface rounded-sm p-4 shadow-card border border-border slide-up" style="animation-delay:0.20s">
          <div class="text-[0.75rem] uppercase tracking-[0.5px] text-muted">Hostname</div>
          <div class="text-[1.05rem] font-semibold mt-1.5" id="info-host">-</div>
        </div>
        <div class="bg-surface rounded-sm p-4 shadow-card border border-border slide-up" style="animation-delay:0.22s">
          <div class="text-[0.75rem] uppercase tracking-[0.5px] text-muted">Uptime</div>
          <div class="text-[1.05rem] font-semibold mt-1.5" id="info-uptime">-</div>
        </div>
        <div class="bg-surface rounded-sm p-4 shadow-card border border-border slide-up" style="animation-delay:0.24s">
          <div class="text-[0.75rem] uppercase tracking-[0.5px] text-muted">Local IP</div>
          <div class="text-[1.05rem] font-semibold mt-1.5" id="info-ip">-</div>
        </div>
        <div class="bg-surface rounded-sm p-4 shadow-card border border-border slide-up" style="animation-delay:0.26s">
          <div class="text-[0.75rem] uppercase tracking-[0.5px] text-muted">Time</div>
          <div class="text-[1.05rem] font-semibold mt-1.5" id="info-time">-</div>
        </div>
      </div>

      <div class="text-[0.75rem] text-muted text-center mt-3 pb-2" id="last-updated"></div>

    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script>
    function applyBar(barId, pct) {
      const el = document.getElementById(barId);
      if (!el) return;
      el.style.width = `${clamp(pct, 0, 100)}%`;
      el.className = `progress-fill ${progressClass(pct)}`;
    }

    async function load() {
      const [sys, net] = await Promise.all([
        fetchAPI('/api/system'),
        fetchAPI('/api/network'),
      ]);

      if (sys) {
        document.getElementById('cpu-pct').textContent    = `${sys.cpu_percent}%`;
        applyBar('cpu-bar', sys.cpu_percent);
        if (sys.cpu_temp != null) {
          const t = sys.cpu_temp;
          let label, color, bg;
          if (t < 60)      { label = 'Cool';       color = '#1E6E3A'; bg = 'var(--success-light)'; }
          else if (t < 70) { label = 'Warm';        color = '#7a5a00'; bg = '#fff7cc'; }
          else if (t < 80) { label = 'Hot';         color = '#7a3300'; bg = '#ffe6cc'; }
          else             { label = 'Throttling!'; color = '#fff';    bg = 'var(--error)'; }
          document.getElementById('cpu-temp').innerHTML =
            `<img src="../../assets/icons/thermometer.svg" width="14" height="14" alt="" />` +
            ` <span style="font-weight:700">${t}°C</span>` +
            ` <span style="display:inline-block;padding:1px 7px;border-radius:99px;font-size:0.72rem;font-weight:700;background:${bg};color:${color}">${label}</span>`;
        }

        document.getElementById('ram-pct').textContent    = `${sys.memory_percent}%`;
        document.getElementById('ram-detail').textContent = `${sys.memory_used_gb} GB / ${sys.memory_total_gb} GB`;
        applyBar('ram-bar', sys.memory_percent);

        document.getElementById('disk-pct').textContent    = `${sys.disk_percent}%`;
        document.getElementById('disk-detail').textContent = `${sys.disk_used_gb} GB / ${sys.disk_total_gb} GB`;
        applyBar('disk-bar', sys.disk_percent);


        document.getElementById('info-host').textContent   = sys.hostname  || '-';
        document.getElementById('info-uptime').textContent = sys.uptime    || '-';
        document.getElementById('info-time').textContent   = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      }

      if (net) {
        document.getElementById('info-ip').textContent = net.local_ip || '-';
      }

      setLastUpdated('last-updated', new Date());
    }

    load();
    setInterval(load, 5_000);
  </script>
</body>
</html>
