<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Uptime Monitor — HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      'var(--bg)',
            surface: 'var(--surface)',
            success: 'var(--success)',
            error:   'var(--error)',
            text:    'var(--text)',
            muted:   'var(--text-secondary)',
            border:  'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div id="server-down-overlay" style="display:none;position:fixed;inset:0;z-index:9999;background:#c0392b;flex-direction:column;align-items:center;justify-content:center;gap:24px;animation:pulse-bg 1.5s ease-in-out infinite">
    <div style="font-size:5rem;font-weight:900;color:#fff;letter-spacing:0.08em;text-shadow:0 4px 24px rgba(0,0,0,0.4)">SERVER DOWN</div>
    <div style="font-size:1.1rem;color:rgba(255,255,255,0.75);letter-spacing:0.1em;text-transform:uppercase" id="down-detail"></div>
    <button onclick="document.getElementById('server-down-overlay').style.display='none'" style="margin-top:16px;padding:10px 28px;border:2px solid rgba(255,255,255,0.5);border-radius:8px;background:transparent;color:#fff;font-size:0.95rem;cursor:pointer;letter-spacing:0.05em">Dismiss</button>
  </div>
  <style>
    @keyframes pulse-bg { 0%,100%{background:#c0392b} 50%{background:#e74c3c} }
  </style>

  <div class="flex flex-col h-screen overflow-hidden">

    <header class="flex items-center px-6 py-[14px] bg-surface border-b border-border shadow-app gap-[14px] flex-shrink-0 z-10">
      <button class="w-11 h-11 min-w-[44px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.4rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <span class="text-[1.45rem] font-bold text-text flex items-center gap-2">
        <img src="../../assets/icons/hourglass.svg" width="20" height="20" alt="" /> Uptime Monitor
      </span>
      <button class="btn btn--secondary btn--sm ml-auto" onclick="refresh()" id="refresh-btn"><img src="../../assets/icons/refresh.svg" width="16" height="16" alt="Refresh" /></button>
    </header>

    <div class="flex-1 overflow-y-auto p-6">

      <div class="grid grid-cols-3 gap-[14px] mb-7">
        <div class="bg-surface rounded-sm py-[18px] px-[14px] shadow-card text-center border border-border slide-up">
          <div class="text-[2.6rem] font-bold leading-none text-success" id="count-up">–</div>
          <div class="text-[0.76rem] uppercase tracking-[0.6px] text-muted mt-1">Online</div>
        </div>
        <div class="bg-surface rounded-sm py-[18px] px-[14px] shadow-card text-center border border-border slide-up">
          <div class="text-[2.6rem] font-bold leading-none text-error" id="count-down">–</div>
          <div class="text-[0.76rem] uppercase tracking-[0.6px] text-muted mt-1">Offline</div>
        </div>
        <div class="bg-surface rounded-sm py-[18px] px-[14px] shadow-card text-center border border-border slide-up">
          <div class="text-[2.6rem] font-bold leading-none text-text" id="count-total">–</div>
          <div class="text-[0.76rem] uppercase tracking-[0.6px] text-muted mt-1">Total</div>
        </div>
      </div>

      <div class="flex items-center mb-3">
        <span class="text-[0.77rem] font-bold uppercase tracking-[0.8px] text-muted" style="width:45%">Service</span>
        <span class="text-[0.77rem] font-bold uppercase tracking-[0.8px] text-muted" style="flex:1;padding-left:20px">7-Day History</span>
      </div>
      <div id="services-list">
        <div class="text-center py-[52px] px-6 text-muted">
          <div class="text-[3rem] mb-[14px]" style="animation:pulse 1s infinite">
            <img src="../../assets/icons/hourglass.svg" width="48" height="48" alt="" class="mx-auto" />
          </div>
          <div class="text-[1.1rem] font-semibold text-text">Checking services…</div>
        </div>
      </div>

      <div class="text-[0.75rem] text-muted text-center mt-3 pb-2" id="last-updated"></div>

    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script>
    async function refresh() {
      const btn  = document.getElementById('refresh-btn');
      const list = document.getElementById('services-list');

      if (btn) btn.disabled = true;

      list.innerHTML = `
        <div class="text-center py-[52px] px-6 text-muted">
          <div class="text-[3rem] mb-[14px]" style="animation:pulse 1s infinite">
            <img src="../../assets/icons/hourglass.svg" width="48" height="48" alt="" class="mx-auto" />
          </div>
          <div class="text-[1.1rem] font-semibold text-text">Checking services…</div>
        </div>`;

      const data = await fetchAPI('/api/uptime');

      if (btn) btn.disabled = false;

      if (!data) {
        setError('services-list', 'Could not reach HomeDeck server', 'Make sure the backend is running on port 8000');
        return;
      }

      const services = data.services || [];
      const up   = services.filter(s => s.status === 'up').length;
      const down = services.filter(s => s.status === 'down').length;

      document.getElementById('count-up').textContent    = up;
      document.getElementById('count-down').textContent  = down;
      document.getElementById('count-total').textContent = services.length;

      const overlay = document.getElementById('server-down-overlay');
      if (services.length > 0 && up === 0) {
        document.getElementById('down-detail').textContent = `All ${services.length} service${services.length > 1 ? 's' : ''} offline`;
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = 'none';
      }

      if (services.length === 0) {
        list.innerHTML = `
          <div class="text-center py-[52px] px-6 text-muted">
            <div class="text-[3rem] mb-[14px]"><img src="../../assets/icons/hourglass.svg" width="48" height="48" alt="" class="mx-auto" /></div>
            <div class="text-[1.1rem] font-semibold text-text">No services configured</div>
            <div class="text-[0.85rem] mt-[5px]">Add entries to <code>backend/config.json</code></div>
          </div>`;
        return;
      }

      list.innerHTML = services.map((s, i) => {
        const isUp    = s.status === 'up';
        const ms      = s.response_ms;
        const msClass = ms == null ? '' : ms > 1000 ? 'bad' : ms > 500 ? 'slow' : '';
        const msText  = ms != null ? `${ms} ms` : '–';
        const errText = s.error ? ` · ${s.error}` : '';
        const histId  = 'hist-' + s.name.replace(/[^a-zA-Z0-9]/g, '_');

        return `
          <div class="bg-surface rounded-sm px-[18px] py-[13px] mb-2.5 shadow-card flex items-center border border-border slide-up"
               style="animation-delay:${i * 0.05}s;gap:0">
            <div style="width:45%;min-width:0;flex-shrink:0">
              <div class="flex items-center gap-2">
                <span class="text-[1rem] font-semibold whitespace-nowrap overflow-hidden text-ellipsis">${s.name}</span>
                <span class="badge badge--${isUp ? 'up' : 'down'}" style="flex-shrink:0">${isUp ? '● UP' : '● DOWN'}</span>
              </div>
              <div class="text-[0.75rem] text-muted mt-0.5 whitespace-nowrap overflow-hidden text-ellipsis">
                <span class="response-time ${msClass}">${msText}</span> · ${s.url}${errText}
              </div>
            </div>
            <div style="width:1px;height:36px;background:var(--border);flex-shrink:0;margin:0 16px"></div>
            <div style="flex:1;min-width:0" id="${histId}">
              <div style="height:16px;border-radius:3px;background:var(--border);opacity:0.35"></div>
              <div class="flex justify-between text-[0.62rem] text-muted mt-1"><span>7d ago</span><span>now</span></div>
            </div>
          </div>`;
      }).join('');

      setLastUpdated('last-updated', new Date());
    }

    async function loadHistory() {
      const data = await fetchAPI('/api/uptime/history');
      if (!data || !data.history || data.history.length === 0) return;

      const BUCKETS   = 168;
      const BUCKET_MS = 3_600_000;
      const now       = Date.now();

      const names = [];
      const seen  = new Set();
      for (const entry of data.history)
        for (const r of entry.results)
          if (!seen.has(r.name)) { names.push(r.name); seen.add(r.name); }

      const buckets = {};
      for (const n of names) buckets[n] = new Array(BUCKETS).fill(null);

      for (const entry of data.history) {
        const age = now - new Date(entry.ts).getTime();
        if (age > BUCKETS * BUCKET_MS) continue;
        const idx = Math.floor((BUCKETS * BUCKET_MS - age) / BUCKET_MS);
        if (idx < 0 || idx >= BUCKETS) continue;
        for (const r of entry.results) {
          if (!buckets[r.name]) continue;
          const cur = buckets[r.name][idx];
          if (cur === null || (cur === 'up' && r.status === 'down'))
            buckets[r.name][idx] = r.status === 'up' ? 'up' : 'down';
        }
      }

      for (const name of names) {
        const slot = document.getElementById('hist-' + name.replace(/[^a-zA-Z0-9]/g, '_'));
        if (!slot) continue;

        const upCount   = buckets[name].filter(s => s === 'up').length;
        const dataCount = upCount + buckets[name].filter(s => s === 'down').length;
        const pct       = dataCount > 0 ? Math.round(upCount / dataCount * 100) : 100;
        const pctColor  = pct === 100 ? 'var(--success)' : pct >= 90 ? 'var(--warning)' : 'var(--error)';

        const segs = buckets[name].map((s, i) => {
          const bg  = s === 'up' ? '#34A853' : s === 'down' ? '#EA4335' : 'var(--border)';
          const ts  = new Date(now - (BUCKETS - i - 1) * BUCKET_MS);
          const tip = ts.toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          return `<div style="flex:1;background:${bg};height:100%" title="${tip} — ${s ?? 'no data'}"></div>`;
        }).join('');

        slot.innerHTML = `
          <div class="flex justify-between items-center mb-1" style="font-size:0.7rem">
            <span class="text-muted">7d ago</span>
            <span style="font-weight:700;color:${pctColor}">${pct}%</span>
            <span class="text-muted">now</span>
          </div>
          <div style="display:flex;height:16px;border-radius:3px;overflow:hidden;gap:1px">${segs}</div>`;
      }
    }

    refresh().then(() => loadHistory());
    setInterval(refresh, 60_000);
    setInterval(loadHistory, 300_000);
  </script>
</body>
</html>
