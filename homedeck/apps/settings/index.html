<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Settings — HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       'var(--bg)',
            surface:  'var(--surface)',
            raised:   'var(--surface-raised)',
            primary:  'var(--primary)',
            success:  'var(--success)',
            'success-light': 'var(--success-light)',
            warning:  'var(--warning)',
            error:    'var(--error)',
            text:     'var(--text)',
            muted:    'var(--text-secondary)',
            border:   'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden">

    <!-- Header: back button + current page name -->
    <header class="flex items-center px-4 py-2 bg-surface border-b border-border shadow-app gap-3 flex-shrink-0 z-10">
      <button class="w-9 h-9 min-w-[36px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.2rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <img id="page-icon" src="../../assets/icons/cloud_with_sun.svg" width="16" height="16" alt="" class="flex-shrink-0" />
      <span id="page-title" class="text-[1.15rem] font-bold text-text flex-1 truncate">Weather</span>
    </header>

    <!-- Pages viewport -->
    <div class="flex-1 overflow-hidden relative" id="pages-viewport">
      <div id="pages-track" class="flex h-full" style="width:500%;will-change:transform;transition:transform 0.3s ease">

        <!-- ── PAGE 0: Weather ─────────────────────────────── -->
        <div class="h-full" style="width:20%;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y">
          <div class="bg-surface rounded-card shadow-card border border-border overflow-hidden mx-3 mt-3 mb-3">
            <div class="px-4 py-2 border-b border-border text-[0.72rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
              <img src="../../assets/icons/cloud_with_sun.svg" width="16" height="16" alt="" /> Weather
            </div>

            <div class="px-4 py-2 border-b border-border flex flex-col items-start gap-1.5">
              <div class="text-[0.85rem] font-semibold text-text">Location</div>
              <div class="w-full flex flex-col gap-2">
                <div class="relative flex-1 min-w-[200px]">
                  <input class="input" id="city-input" type="text"
                         placeholder="Search for a city…"
                         autocomplete="off"
                         oninput="onCityInput()" />
                  <div class="city-results absolute top-[calc(100%+4px)] left-0 right-0 bg-surface border-[1.5px] border-primary rounded-xs shadow-hover z-50 hidden max-h-[220px] overflow-y-auto"
                       id="city-results"></div>
                </div>
                <div class="city-selected-chip hidden items-center gap-1.5 px-3 py-1.5 bg-success-light border border-[#A8D5B5] rounded-full text-[0.82rem] font-semibold text-[#1E6E3A] mt-2"
                     id="city-chip"></div>
              </div>
            </div>

            <div class="px-4 py-2 border-b border-border flex items-center gap-3">
              <div class="text-[0.85rem] font-semibold text-text flex-shrink-0 min-w-[100px]">Temperature</div>
              <div class="flex border-[1.5px] border-border rounded-xs overflow-hidden" id="unit-toggle">
                <button class="toggle-opt px-4 py-1.5 border-none bg-surface font-[inherit] text-[0.85rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms] border-r border-border"
                        data-val="fahrenheit" onclick="setUnit(this)">°F</button>
                <button class="toggle-opt px-4 py-1.5 border-none bg-surface font-[inherit] text-[0.85rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms]"
                        data-val="celsius" onclick="setUnit(this)">°C</button>
              </div>
            </div>

            <div class="px-4 py-2 flex items-center gap-3">
              <div class="text-[0.85rem] font-semibold text-text flex-shrink-0 min-w-[100px]">Wind Speed</div>
              <div class="flex border-[1.5px] border-border rounded-xs overflow-hidden" id="wind-toggle">
                <button class="toggle-opt px-4 py-1.5 border-none bg-surface font-[inherit] text-[0.85rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms] border-r border-border"
                        data-val="mph" onclick="setWind(this)">mph</button>
                <button class="toggle-opt px-4 py-1.5 border-none bg-surface font-[inherit] text-[0.85rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms]"
                        data-val="kmh" onclick="setWind(this)">km/h</button>
              </div>
            </div>
          </div>
        </div>

        <!-- ── PAGE 1: Uptime Monitor ──────────────────────── -->
        <div class="h-full" style="width:20%;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y">
          <div class="bg-surface rounded-card shadow-card border border-border overflow-hidden mx-3 mt-3 mb-3">
            <div class="px-4 py-2 border-b border-border text-[0.72rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
              <img src="../../assets/icons/hourglass.svg" width="16" height="16" alt="" /> Uptime Monitor
            </div>
            <div id="checks-list"></div>
            <div class="flex gap-2 px-4 py-2 flex-wrap">
              <input class="input" id="new-check-name" type="text" placeholder="Name" style="width:110px;flex-shrink:0" />
              <input class="input" id="new-check-url" placeholder="https://example.com" style="flex:1;min-width:140px" type="url" />
              <button class="btn btn--primary btn--sm" onclick="addCheck()">+ Add</button>
            </div>
          </div>
        </div>

        <!-- ── PAGE 2: Home Assistant ──────────────────────── -->
        <div class="h-full" style="width:20%;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y">
          <div class="bg-surface rounded-card shadow-card border border-border mx-3 mt-3 mb-3">
            <div class="px-4 py-2 border-b border-border text-[0.72rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2 rounded-t-card">
              <img src="../../assets/icons/house.svg" width="16" height="16" alt="" /> Home Assistant
            </div>

            <div class="px-4 py-2 border-b border-border flex flex-col items-start gap-1">
              <div class="text-[0.85rem] font-semibold text-text">Server URL</div>
              <input class="input" id="ha-url" type="url"
                     placeholder="http://homeassistant.local:8123"
                     style="width:100%" />
            </div>

            <div class="px-4 py-2 border-b border-border flex flex-col items-start gap-1">
              <div class="text-[0.85rem] font-semibold text-text">Access Token</div>
              <input class="input" id="ha-token" type="password"
                     placeholder="Long-lived access token"
                     style="width:100%" />
              <div class="text-[0.72rem] text-muted">
                Generate in HA → Profile → Long-Lived Access Tokens
              </div>
            </div>

            <div class="px-4 py-2 flex flex-col items-start">
              <div class="flex items-center w-full mb-1.5 gap-2">
                <div class="text-[0.85rem] font-semibold text-text flex-1">Favourite Scenes</div>
                <button class="btn btn--secondary btn--sm" id="browse-btn" onclick="browseScenes()">
                  <img src="../../assets/icons/house.svg" width="13" height="13" alt="" /> Browse HA Scenes
                </button>
              </div>
              <div id="scenes-list" class="w-full"></div>

              <!-- Scene picker panel -->
              <div id="scene-picker" class="hidden w-full mt-2 border border-border rounded-sm overflow-hidden">
                <div class="px-3 py-2 bg-raised border-b border-border flex items-center gap-2">
                  <span class="text-[0.82rem] font-semibold flex-1 text-text">Available Scenes</span>
                  <button class="btn btn--primary btn--sm" onclick="addSelectedScenes()">+ Add Selected</button>
                  <button class="btn btn--secondary btn--sm" onclick="closePicker()" style="padding:0 10px">✕</button>
                </div>
                <div id="picker-list" class="max-h-[220px] overflow-y-auto"></div>
              </div>

              <!-- Manual add -->
              <div class="flex gap-2 pt-1.5 pb-1 flex-wrap w-full">
                <div class="relative flex-shrink-0" id="icon-picker-wrap">
                  <button type="button"
                          class="input flex items-center justify-center cursor-pointer select-none"
                          id="icon-btn" style="width:44px"
                          onclick="toggleIconPicker(event)"><img src="../../assets/icons/lightbulb.svg" width="22" height="26" alt="" /></button>
                  <input type="hidden" id="new-scene-icon" value="" />
                  <div id="icon-dropdown"
                       class="hidden absolute bottom-[calc(100%+6px)] left-0 bg-surface border-[1.5px] border-primary rounded-xs shadow-hover z-50 p-2"
                       style="width:272px">
                    <div id="icon-grid" class="grid grid-cols-4 gap-1"></div>
                  </div>
                </div>
                <input class="input" id="new-scene-name"  type="text" placeholder="Scene name" style="width:110px;flex-shrink:0" />
                <input class="input" id="new-scene-id"    type="text" placeholder="scene.entity_id" style="flex:1;min-width:120px" />
                <button class="btn btn--primary btn--sm" onclick="addScene()">+ Add</button>
              </div>
            </div>
          </div>
        </div>

        <!-- ── PAGE 3: Stocks ─────────────────────────────── -->
        <div class="h-full" style="width:20%;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y">
          <div class="bg-surface rounded-card shadow-card border border-border overflow-hidden mx-3 mt-3 mb-3">
            <div class="px-4 py-2 border-b border-border text-[0.72rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
              <img src="../../assets/icons/sunrise.svg" width="16" height="16" alt="" /> Stocks
            </div>
            <div id="tickers-list"></div>
            <div class="flex gap-2 px-4 py-2 flex-wrap">
              <input class="input" id="new-ticker" type="text" placeholder="e.g. NVDA" style="width:110px;flex-shrink:0;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" />
              <button class="btn btn--primary btn--sm" onclick="addTicker()">+ Add</button>
            </div>
          </div>
        </div>

        <!-- ── PAGE 4: Dashboard Cards ────────────────────── -->
        <div class="h-full" style="width:20%;flex-shrink:0;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y">
          <div class="bg-surface rounded-card shadow-card border border-border overflow-hidden mx-3 mt-3 mb-3">
            <div class="px-4 py-2 border-b border-border text-[0.72rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
              <img src="../../assets/icons/monitor.svg" width="16" height="16" alt="" /> Dashboard Cards
            </div>

            <!-- Top row pickers -->
            <div class="px-4 py-3 border-b border-border">
              <div class="text-[0.75rem] font-bold text-muted uppercase tracking-[0.5px] mb-2">Top Row (Large)</div>
              <div class="flex gap-3">
                <div class="flex-1 flex flex-col gap-1">
                  <div class="text-[0.72rem] text-muted">Left (wider)</div>
                  <select id="top-left-select" class="input text-[0.85rem] py-2 h-auto"></select>
                </div>
                <div class="flex-1 flex flex-col gap-1">
                  <div class="text-[0.72rem] text-muted">Right</div>
                  <select id="top-right-select" class="input text-[0.85rem] py-2 h-auto"></select>
                </div>
              </div>
            </div>

            <!-- Bottom row toggles + drag reorder -->
            <div class="px-4 py-2 bg-raised border-b border-border">
              <div class="text-[0.75rem] font-bold text-muted uppercase tracking-[0.5px]">Bottom Row</div>
            </div>
            <div id="cards-sortable"></div>
          </div>
        </div>

      </div><!-- /pages-track -->
    </div><!-- /pages-viewport -->

    <!-- Footer: dots + save -->
    <div class="flex-shrink-0 bg-surface border-t border-border shadow-[0_-4px_12px_rgba(0,0,0,0.06)] z-20">
      <div class="flex justify-center items-center gap-1.5 pt-2.5 pb-1" id="page-dots"></div>
      <div class="flex gap-2 px-4 pb-3 pt-1.5">
        <button class="btn btn--primary flex-1" onclick="save()">
          <img src="../../assets/icons/floppy_save.svg" width="18" height="18" alt="" /> Save Settings
        </button>
        <button class="btn btn--secondary" onclick="window.location.href='../../index.html'">Cancel</button>
      </div>
    </div>

  </div>

  <div class="fixed bottom-20 left-1/2 -translate-x-1/2 translate-y-5 bg-text text-white px-6 py-3 rounded-full text-[0.9rem] font-semibold opacity-0 pointer-events-none transition-[opacity,transform] duration-[250ms] whitespace-nowrap z-[100] toast"
       id="toast"></div>

  <script src="../../js/utils.js"></script>
  <script>

    // ── Pagination ────────────────────────────────────────────
    const PAGES = [
      { title: 'Weather',         icon: '../../assets/icons/cloud_with_sun.svg' },
      { title: 'Uptime Monitor',  icon: '../../assets/icons/hourglass.svg'      },
      { title: 'Home Assistant',  icon: '../../assets/icons/house.svg'           },
      { title: 'Stocks',          icon: '../../assets/icons/sunrise.svg'         },
      { title: 'Dashboard Cards', icon: '../../assets/icons/monitor.svg'         },
    ];

    let _currentPage = 0;

    function updatePageUI() {
      document.getElementById('page-title').textContent = PAGES[_currentPage].title;
      document.getElementById('page-icon').src           = PAGES[_currentPage].icon;
      document.querySelectorAll('.page-dot').forEach((dot, i) => {
        dot.classList.toggle('dot-active',   i === _currentPage);
        dot.classList.toggle('dot-inactive', i !== _currentPage);
      });
    }

    function goToPage(n) {
      _currentPage = Math.max(0, Math.min(PAGES.length - 1, n));
      document.getElementById('pages-track').style.transform = `translateX(-${_currentPage * 20}%)`;
      updatePageUI();
    }

    function renderDots() {
      document.getElementById('page-dots').innerHTML = PAGES.map((p, i) =>
        `<button class="page-dot ${i === 0 ? 'dot-active' : 'dot-inactive'}"
                 onclick="goToPage(${i})" title="${p.title}"></button>`
      ).join('');
    }

    // ── Touch swipe detection ─────────────────────────────────
    // touch-action:pan-y on each page div tells the browser to only handle
    // vertical scrolling natively, so horizontal touches reach our listener.
    const _vp = document.getElementById('pages-viewport');
    let _tx0 = 0, _ty0 = 0, _dir = null;

    _vp.addEventListener('touchstart', e => {
      _tx0 = e.touches[0].clientX;
      _ty0 = e.touches[0].clientY;
      _dir = null;
    }, { passive: true });

    _vp.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - _tx0;
      const dy = e.touches[0].clientY - _ty0;
      if (_dir === null && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
        _dir = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
      }
      if (_dir === 'h') e.preventDefault();
    }, { passive: false });

    _vp.addEventListener('touchend', e => {
      if (_dir !== 'h') return;
      const dx = e.changedTouches[0].clientX - _tx0;
      if (Math.abs(dx) > 40) goToPage(_currentPage + (dx < 0 ? 1 : -1));
      _dir = null;
    });

    renderDots();

    // ── State ─────────────────────────────────────────────────
    let _cfg      = {};
    let _lat      = null;
    let _lon      = null;
    let _cityName = '';
    let _debounce = null;
    let _tickers  = [];

    const ALL_CARD_DEFS = [
      { id: 'weather', label: 'Weather' },
      { id: 'server',  label: 'System' },
      { id: 'uptime',  label: 'Uptime Monitor' },
      { id: 'ha',      label: 'Home Assistant' },
      { id: 'stocks',  label: 'Stocks' },
      { id: 'network', label: 'Network' },
    ];
    let _topLeft     = 'weather';
    let _topRight    = 'server';
    let _bottomOrder = ['uptime', 'ha', 'stocks', 'network'];
    let _cardVisible = {};
    let _dragSrc     = null;

    function _getBottomDefs() {
      const topSet = new Set([_topLeft, _topRight]);
      return _bottomOrder
        .filter(id => !topSet.has(id))
        .map(id => ALL_CARD_DEFS.find(d => d.id === id))
        .filter(Boolean);
    }

    function loadCardSettings() {
      const stored = JSON.parse(localStorage.getItem('homedeck_cards') || '{}');
      _topLeft  = stored.topLeft  || 'weather';
      _topRight = stored.topRight || 'server';
      if (_topLeft === _topRight) _topRight = 'server';

      const topSet = new Set([_topLeft, _topRight]);
      const nonTop = ALL_CARD_DEFS.filter(d => !topSet.has(d.id)).map(d => d.id);
      const storedBottom = Array.isArray(stored.bottomOrder) ? stored.bottomOrder : [];
      _bottomOrder = [
        ...storedBottom.filter(id => nonTop.includes(id)),
        ...nonTop.filter(id => !storedBottom.includes(id)),
      ];

      nonTop.forEach(id => { _cardVisible[id] = stored[id] !== false; });

      renderTopSelects();
      renderCardSettings();
    }

    function renderTopSelects() {
      ['top-left-select', 'top-right-select'].forEach((selId, idx) => {
        const sel = document.getElementById(selId);
        if (!sel) return;
        const currentVal = idx === 0 ? _topLeft : _topRight;
        const otherVal   = idx === 0 ? _topRight : _topLeft;
        sel.innerHTML = ALL_CARD_DEFS
          .filter(d => d.id !== otherVal)
          .map(d => `<option value="${d.id}"${d.id === currentVal ? ' selected' : ''}>${d.label}</option>`)
          .join('');
        sel.onchange = () => {
          if (idx === 0) _topLeft  = sel.value;
          else           _topRight = sel.value;
          if (_topLeft === _topRight) {
            const fallback = ALL_CARD_DEFS.find(d => d.id !== _topLeft && d.id !== _topRight);
            if (idx === 0) _topRight = fallback?.id || 'server';
            else           _topLeft  = fallback?.id || 'weather';
          }
          const topSet = new Set([_topLeft, _topRight]);
          const nonTop = ALL_CARD_DEFS.filter(d => !topSet.has(d.id)).map(d => d.id);
          _bottomOrder = [
            ..._bottomOrder.filter(id => nonTop.includes(id)),
            ...nonTop.filter(id => !_bottomOrder.includes(id)),
          ];
          nonTop.forEach(id => { if (_cardVisible[id] == null) _cardVisible[id] = true; });
          renderTopSelects();
          renderCardSettings();
        };
      });
    }

    function renderCardSettings() {
      const container = document.getElementById('cards-sortable');
      const defs = _getBottomDefs();
      container.innerHTML = defs.map((def, i) => {
        const isLast = i === defs.length - 1;
        return `
          <div class="card-sort-row flex items-center gap-3 px-4 py-2 transition-opacity duration-[180ms] ${isLast ? '' : 'border-b border-[var(--border)]'}"
               draggable="true" data-card-id="${def.id}">
            <div class="text-[1.1rem] text-muted flex-shrink-0 cursor-grab select-none leading-none" title="Drag to reorder">⠿</div>
            <div class="flex-1 text-[0.85rem] font-semibold text-text">${def.label}</div>
            <label class="relative inline-block w-11 h-6 flex-shrink-0 cursor-pointer">
              <input type="checkbox" class="opacity-0 w-0 h-0" data-card-id="${def.id}" ${_cardVisible[def.id] !== false ? 'checked' : ''} />
              <span class="toggle-slider absolute inset-0 bg-border rounded-full transition-colors duration-[180ms]"></span>
            </label>
          </div>`;
      }).join('');

      container.querySelectorAll('.card-sort-row').forEach(row => {
        row.addEventListener('dragstart', onDragStart);
        row.addEventListener('dragover',  onDragOver);
        row.addEventListener('dragleave', onDragLeave);
        row.addEventListener('drop',      onDrop);
        row.addEventListener('dragend',   onDragEnd);
      });
    }

    function onDragStart(e) {
      _dragSrc = this;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => this.style.opacity = '0.35', 0);
    }
    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (this !== _dragSrc) this.classList.add('drag-over');
    }
    function onDragLeave() { this.classList.remove('drag-over'); }
    function onDrop(e) {
      e.stopPropagation();
      this.classList.remove('drag-over');
      if (_dragSrc === this) return;
      document.querySelectorAll('#cards-sortable input[data-card-id]').forEach(cb => {
        _cardVisible[cb.dataset.cardId] = cb.checked;
      });
      const si = _bottomOrder.indexOf(_dragSrc.dataset.cardId);
      const di = _bottomOrder.indexOf(this.dataset.cardId);
      _bottomOrder.splice(si, 1);
      _bottomOrder.splice(di, 0, _dragSrc.dataset.cardId);
      renderCardSettings();
    }
    function onDragEnd() {
      this.style.opacity = '1';
      document.querySelectorAll('.card-sort-row').forEach(r => r.classList.remove('drag-over'));
    }

    function saveCardSettings() {
      document.querySelectorAll('#cards-sortable input[data-card-id]').forEach(cb => {
        _cardVisible[cb.dataset.cardId] = cb.checked;
      });
      const out = { topLeft: _topLeft, topRight: _topRight, bottomOrder: _bottomOrder };
      _bottomOrder.forEach(id => { out[id] = _cardVisible[id] !== false; });
      localStorage.setItem('homedeck_cards', JSON.stringify(out));
    }

    async function init() {
      const data = await fetchAPI('/api/config');
      if (!data) {
        showToast('Could not load config', true);
        return;
      }
      _cfg = data;

      const w = data.weather || {};
      _lat      = w.latitude;
      _lon      = w.longitude;
      _cityName = w.location_name || '';
      if (_cityName) showCityChip(_cityName, _lat, _lon);

      setActiveToggle('unit-toggle', w.units      || 'fahrenheit');
      setActiveToggle('wind-toggle', w.wind_unit  || 'mph');

      renderChecks((data.uptime || {}).checks || []);

      _tickers = (data.stocks || {}).tickers || [];
      renderTickers(_tickers);

      const ha = data.homeassistant || {};
      document.getElementById('ha-url').value   = ha.url   || '';
      document.getElementById('ha-token').value = ha.token || '';
      renderScenes(ha.scenes || []);

      loadCardSettings();
    }

    function onCityInput() {
      clearTimeout(_debounce);
      const q = document.getElementById('city-input').value.trim();
      if (q.length < 2) { closeCityDropdown(); return; }
      _debounce = setTimeout(() => searchCity(q), 400);
    }

    async function searchCity(q) {
      const data = await fetchAPI(`/api/geocode?q=${encodeURIComponent(q)}`);
      const results = data?.results || [];
      const box = document.getElementById('city-results');
      if (!results.length) { closeCityDropdown(); return; }
      box.innerHTML = results.map(r => `
        <div class="city-result-item px-[14px] py-3 cursor-pointer text-[0.9rem] border-b border-[var(--border)] last:border-b-0 transition-colors duration-[180ms]"
             onclick="selectCity(${r.latitude},${r.longitude},'${escJs(r.display)}')">
          <div>${r.display}</div>
          <div class="text-[0.75rem] text-muted mt-px">${r.latitude.toFixed(4)}, ${r.longitude.toFixed(4)}</div>
        </div>`).join('');
      box.classList.add('open');
    }

    function selectCity(lat, lon, name) {
      _lat      = lat;
      _lon      = lon;
      _cityName = name;
      document.getElementById('city-input').value = '';
      closeCityDropdown();
      showCityChip(name, lat, lon);
    }

    function showCityChip(name, lat, lon) {
      const chip = document.getElementById('city-chip');
      chip.style.display = 'inline-flex';
      chip.textContent = `✓ ${name}`;
      if (lat != null) chip.title = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
    }

    function closeCityDropdown() {
      document.getElementById('city-results').classList.remove('open');
    }

    function setActiveToggle(groupId, value) {
      document.querySelectorAll(`#${groupId} .toggle-opt`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.val === value);
      });
    }

    function setUnit(btn) {
      document.querySelectorAll('#unit-toggle .toggle-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setWind(btn) {
      document.querySelectorAll('#wind-toggle .toggle-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function getToggleVal(groupId) {
      return document.querySelector(`#${groupId} .toggle-opt.active`)?.dataset.val || null;
    }

    let _checks = [];

    function renderChecks(list) {
      _checks = list;
      const el = document.getElementById('checks-list');
      if (!list.length) {
        el.innerHTML = `<div class="px-5 py-3 text-muted text-[0.88rem]">No services yet.</div>`;
        return;
      }
      el.innerHTML = list.map((c, i) => `
        <div class="flex items-center gap-2.5 px-5 py-2.5 border-b border-[var(--border)]">
          <div class="text-[0.9rem] font-semibold min-w-[120px]">${escHtml(c.name)}</div>
          <div class="text-[0.8rem] text-muted flex-1 overflow-hidden text-ellipsis whitespace-nowrap">${escHtml(c.url)}</div>
          <button class="btn btn--danger btn--sm btn--icon"
                  onclick="removeCheck(${i})" title="Remove"><img src="../../assets/icons/trash.svg" width="14" height="14" alt="Remove" /></button>
        </div>`).join('');
    }

    function addCheck() {
      const name = document.getElementById('new-check-name').value.trim();
      const url  = document.getElementById('new-check-url').value.trim();
      if (!name || !url) return;
      _checks = [..._checks, { name, url }];
      renderChecks(_checks);
      document.getElementById('new-check-name').value = '';
      document.getElementById('new-check-url').value  = '';
    }

    function removeCheck(i) {
      _checks = _checks.filter((_, idx) => idx !== i);
      renderChecks(_checks);
    }

    let _scenes = [];

    function renderScenes(list) {
      _scenes = list;
      const el = document.getElementById('scenes-list');
      if (!list.length) {
        el.innerHTML = `<div class="text-muted text-[0.88rem] py-2">No scenes yet.</div>`;
        return;
      }
      el.innerHTML = list.map((s, i) => `
        <div class="flex items-center gap-2.5 py-2.5 border-b border-[var(--border)]">
          <div class="w-8 flex items-center justify-center flex-shrink-0">${iconHtml(s.icon)}</div>
          <div class="flex-1">
            <div class="font-semibold text-[0.9rem]">${escHtml(s.name)}</div>
            <div class="text-[0.78rem] text-muted">${escHtml(s.entity_id)}</div>
          </div>
          <button class="btn btn--danger btn--sm btn--icon"
                  onclick="removeScene(${i})" title="Remove"><img src="../../assets/icons/trash.svg" width="14" height="14" alt="Remove" /></button>
        </div>`).join('');
    }

    function addScene() {
      const icon = document.getElementById('new-scene-icon').value.trim();
      const name = document.getElementById('new-scene-name').value.trim();
      const id   = document.getElementById('new-scene-id').value.trim();
      if (!name || !id) return;
      _scenes = [..._scenes, { icon, name, entity_id: id }];
      renderScenes(_scenes);
      document.getElementById('new-scene-icon').value  = '';
      document.getElementById('icon-btn').innerHTML    = '<img src="../../assets/icons/lightbulb.svg" width="26" height="26" alt="" />';
      document.getElementById('new-scene-name').value = '';
      document.getElementById('new-scene-id').value   = '';
    }

    function removeScene(i) {
      _scenes = _scenes.filter((_, idx) => idx !== i);
      renderScenes(_scenes);
    }

    const SCENE_ICONS = [
      'lightbulb.svg',   'moon.svg',        'sun.svg',           'house.svg',
      'movie.svg',       'music.svg',       'couch.svg',         'eu_socket.svg',
      'monitor.svg',     'bed.svg',         'book.svg',          'candle.svg',
      'gaming.svg',      'plant.svg',       'shower.svg',        'cooking.svg',
      'sunrise.svg',
    ];

    function iconHtml(icon, size = 28) {
      if (!icon) return `<img src="../../assets/icons/lightbulb.svg" width="${size}" height="${size}" alt="" />`;
      if (icon.endsWith('.svg')) return `<img src="../../assets/icons/${icon}" width="${size}" height="${size}" alt="" />`;
      return icon;
    }

    document.getElementById('icon-grid').innerHTML = SCENE_ICONS.map(ic =>
      `<button type="button"
               class="w-[62px] h-[62px] rounded-xs hover:bg-bg transition-colors duration-[120ms] border-none bg-transparent cursor-pointer flex items-center justify-center"
               onclick="selectIcon('${ic}')">
         <img src="../../assets/icons/${ic}" width="36" height="36" alt="" onerror="this.style.opacity='0.2'" />
       </button>`
    ).join('');

    function toggleIconPicker(e) {
      e.stopPropagation();
      document.getElementById('icon-dropdown').classList.toggle('hidden');
    }

    function selectIcon(icon) {
      document.getElementById('icon-btn').innerHTML = `<img src="../../assets/icons/${icon}" width="26" height="26" alt="" />`;
      document.getElementById('new-scene-icon').value = icon;
      document.getElementById('icon-dropdown').classList.add('hidden');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#icon-picker-wrap'))
        document.getElementById('icon-dropdown')?.classList.add('hidden');
      if (!e.target.closest('.city-search-wrap') && !e.target.closest('#city-results'))
        closeCityDropdown();
    });

    let _haScenes = [];

    async function browseScenes() {
      const btn        = document.getElementById('browse-btn');
      const picker     = document.getElementById('scene-picker');
      const pickerList = document.getElementById('picker-list');

      if (!picker.classList.contains('hidden')) { closePicker(); return; }

      btn.disabled    = true;
      btn.textContent = 'Loading…';

      const haUrl   = document.getElementById('ha-url').value.trim();
      const haToken = document.getElementById('ha-token').value.trim();

      if (!haUrl || !haToken) {
        showToast('<img src="../../assets/icons/x_mark.svg" width="14" height="14" alt="" /> Enter HA URL and token first', true);
        btn.disabled  = false;
        btn.innerHTML = '<img src="../../assets/icons/house.svg" width="13" height="13" alt="" /> Browse HA Scenes';
        return;
      }

      await fetchAPI('/api/config', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ homeassistant: { url: haUrl, token: haToken } }),
      });

      const data = await fetchAPI('/api/ha/scenes');

      btn.disabled  = false;
      btn.innerHTML = '<img src="../../assets/icons/house.svg" width="13" height="13" alt="" /> Browse HA Scenes';

      if (!data?.ok) {
        showToast(`<img src="../../assets/icons/x_mark.svg" width="14" height="14" alt="" /> ${data?.error || 'Could not fetch scenes'}`, true);
        return;
      }

      _haScenes = data.scenes || [];

      if (!_haScenes.length) { showToast('No scenes found in Home Assistant'); return; }

      pickerList.innerHTML = _haScenes.map((s, i) => {
        const added = _scenes.some(x => x.entity_id === s.entity_id);
        return `
          <label class="flex items-center gap-3 px-4 py-2.5 border-b border-[var(--border)] last:border-b-0 cursor-pointer transition-colors duration-[150ms] ${added ? 'opacity-50 cursor-default' : 'hover:bg-bg'}">
            <input type="checkbox" class="w-4 h-4 flex-shrink-0" data-idx="${i}" ${added ? 'checked disabled' : ''} />
            <div class="min-w-0">
              <div class="text-[0.88rem] font-semibold text-text truncate">${escHtml(s.name)}</div>
              <div class="text-[0.75rem] text-muted truncate">${escHtml(s.entity_id)}</div>
            </div>
          </label>`;
      }).join('');

      picker.classList.remove('hidden');
    }

    function closePicker() {
      document.getElementById('scene-picker').classList.add('hidden');
    }

    function addSelectedScenes() {
      const checkboxes = document.querySelectorAll('#picker-list input[type=checkbox]:not(:disabled):checked');
      checkboxes.forEach(cb => {
        const s = _haScenes[parseInt(cb.dataset.idx)];
        if (s && !_scenes.some(x => x.entity_id === s.entity_id)) {
          _scenes.push({ name: s.name, entity_id: s.entity_id, icon: '' });
        }
      });
      renderScenes(_scenes);
      closePicker();
    }

    async function save() {
      saveCardSettings();

      const payload = {
        weather: {
          latitude:      _lat      ?? _cfg.weather?.latitude,
          longitude:     _lon      ?? _cfg.weather?.longitude,
          location_name: _cityName || _cfg.weather?.location_name,
          units:         getToggleVal('unit-toggle'),
          wind_unit:     getToggleVal('wind-toggle'),
        },
        uptime: { checks: _checks },
        stocks: { tickers: _tickers },
        homeassistant: {
          url:    document.getElementById('ha-url').value.trim(),
          token:  document.getElementById('ha-token').value.trim(),
          scenes: _scenes,
        },
      };

      const result = await fetchAPI('/api/config', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });

      if (result?.ok) {
        showToast('<img src="../../assets/icons/check_mark.svg" width="14" height="14" alt="" /> Settings saved!');
        setTimeout(() => window.location.href = '../../index.html', 1400);
      } else {
        showToast('<img src="../../assets/icons/x_mark.svg" width="14" height="14" alt="" /> Failed to save', true);
      }
    }

    function showToast(msg, isErr = false) {
      const t = document.getElementById('toast');
      t.innerHTML = msg;
      t.style.background = isErr ? 'var(--error)' : 'var(--text)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function renderTickers(tickers) {
      const el = document.getElementById('tickers-list');
      if (!el) return;
      if (!tickers.length) {
        el.innerHTML = '<div class="px-4 py-3 text-[0.85rem] text-muted">No stocks added yet</div>';
        return;
      }
      el.innerHTML = tickers.map((t, i) => `
        <div class="flex items-center gap-2.5 px-5 py-2.5 border-b border-[var(--border)]">
          <div class="text-[0.9rem] font-bold flex-1">${escHtml(t)}</div>
          <button class="btn btn--danger btn--sm btn--icon" onclick="removeTicker(${i})">
            <img src="../../assets/icons/trash.svg" width="14" height="14" alt="Remove" />
          </button>
        </div>`).join('');
    }

    function addTicker() {
      const val = document.getElementById('new-ticker').value.trim().toUpperCase();
      if (!val || _tickers.includes(val)) return;
      _tickers = [..._tickers, val];
      renderTickers(_tickers);
      document.getElementById('new-ticker').value = '';
    }

    function removeTicker(i) {
      _tickers = _tickers.filter((_, idx) => idx !== i);
      renderTickers(_tickers);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escJs(s) {
      return String(s).replace(/'/g,"\\'");
    }

    init();
  </script>
</body>
</html>
