<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Settings — HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       'var(--bg)',
            surface:  'var(--surface)',
            raised:   'var(--surface-raised)',
            primary:  'var(--primary)',
            success:  'var(--success)',
            'success-light': 'var(--success-light)',
            warning:  'var(--warning)',
            error:    'var(--error)',
            text:     'var(--text)',
            muted:    'var(--text-secondary)',
            border:   'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden">

    <header class="flex items-center px-6 py-[14px] bg-surface border-b border-border shadow-app gap-[14px] flex-shrink-0 z-10">
      <button class="w-11 h-11 min-w-[44px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.4rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <span class="text-[1.45rem] font-bold text-text flex items-center gap-2">
        <img src="../../assets/icons/settings.svg" width="20" height="20" alt="" /> Settings
      </span>
    </header>

    <div class="flex-1 overflow-y-auto" style="padding-bottom:0">

      <div class="bg-surface rounded-card mb-5 shadow-card border border-border overflow-hidden slide-up mx-6 mt-6" style="animation-delay:0.04s">
        <div class="px-5 py-4 border-b border-border text-[0.78rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
          <img src="../../assets/icons/cloud_with_sun.svg" width="20" height="20" alt="" /> Weather
        </div>

        <div class="px-5 py-[14px] border-b border-border flex flex-col items-start gap-2">
          <div class="text-[0.92rem] font-semibold text-text">Location</div>
          <div class="w-full flex flex-col gap-2">
            <div class="relative flex-1 min-w-[200px]">
              <input class="input" id="city-input" type="text"
                     placeholder="Search for a city…"
                     autocomplete="off"
                     oninput="onCityInput()" />
              <div class="city-results absolute top-[calc(100%+4px)] left-0 right-0 bg-surface border-[1.5px] border-primary rounded-xs shadow-hover z-50 hidden max-h-[220px] overflow-y-auto"
                   id="city-results"></div>
            </div>
            <div class="city-selected-chip hidden items-center gap-1.5 px-3 py-1.5 bg-success-light border border-[#A8D5B5] rounded-full text-[0.82rem] font-semibold text-[#1E6E3A] mt-2"
                 id="city-chip"></div>
          </div>
        </div>

        <div class="px-5 py-[14px] border-b border-border flex items-center gap-4">
          <div class="text-[0.92rem] font-semibold text-text flex-shrink-0 min-w-[110px]">Temperature</div>
          <div class="flex items-center gap-2.5 flex-wrap">
            <div class="flex border-[1.5px] border-border rounded-xs overflow-hidden" id="unit-toggle">
              <button class="toggle-opt px-5 py-[9px] border-none bg-surface font-[inherit] text-[0.9rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms] border-r border-border hover:[&:not(.active)]:bg-bg"
                      data-val="fahrenheit" onclick="setUnit(this)">°F</button>
              <button class="toggle-opt px-5 py-[9px] border-none bg-surface font-[inherit] text-[0.9rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms]"
                      data-val="celsius" onclick="setUnit(this)">°C</button>
            </div>
          </div>
        </div>

        <div class="px-5 py-[14px] flex items-center gap-4">
          <div class="text-[0.92rem] font-semibold text-text flex-shrink-0 min-w-[110px]">Wind Speed</div>
          <div class="flex items-center gap-2.5 flex-wrap">
            <div class="flex border-[1.5px] border-border rounded-xs overflow-hidden" id="wind-toggle">
              <button class="toggle-opt px-5 py-[9px] border-none bg-surface font-[inherit] text-[0.9rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms] border-r border-border hover:[&:not(.active)]:bg-bg"
                      data-val="mph" onclick="setWind(this)">mph</button>
              <button class="toggle-opt px-5 py-[9px] border-none bg-surface font-[inherit] text-[0.9rem] font-semibold text-muted cursor-pointer transition-all duration-[180ms]"
                      data-val="kmh" onclick="setWind(this)">km/h</button>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-surface rounded-card mb-5 shadow-card border border-border overflow-hidden slide-up mx-6" style="animation-delay:0.08s">
        <div class="px-5 py-4 border-b border-border text-[0.78rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
          <img src="../../assets/icons/hourglass.svg" width="20" height="20" alt="" /> Uptime Monitor
        </div>
        <div id="checks-list"></div>
        <div class="flex gap-2 px-5 py-3 flex-wrap">
          <input class="input" id="new-check-name" placeholder="Name" style="width:120px;flex-shrink:0" />
          <input class="input" id="new-check-url" placeholder="https://example.com" style="flex:1;min-width:160px" type="url" />
          <button class="btn btn--primary btn--sm" onclick="addCheck()">+ Add</button>
        </div>
      </div>

      <div class="bg-surface rounded-card mb-5 shadow-card border border-border overflow-hidden slide-up mx-6" style="animation-delay:0.12s">
        <div class="px-5 py-4 border-b border-border text-[0.78rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center gap-2">
          <img src="../../assets/icons/house.svg" width="20" height="20" alt="" /> Home Assistant
        </div>

        <div class="px-5 py-[14px] border-b border-border flex flex-col items-start gap-1.5">
          <div class="text-[0.92rem] font-semibold text-text">Server URL</div>
          <input class="input" id="ha-url" type="url"
                 placeholder="http://homeassistant.local:8123"
                 style="width:100%" />
        </div>

        <div class="px-5 py-[14px] border-b border-border flex flex-col items-start gap-1.5">
          <div class="text-[0.92rem] font-semibold text-text">Access Token</div>
          <input class="input" id="ha-token" type="password"
                 placeholder="Long-lived access token"
                 style="width:100%" />
          <div class="text-[0.75rem] text-muted">
            Generate in HA → Profile → Long-Lived Access Tokens
          </div>
        </div>

        <div class="px-5 py-[14px] flex flex-col items-start">
          <div class="flex items-center w-full mb-2 gap-2">
            <div class="text-[0.92rem] font-semibold text-text flex-1">Favourite Scenes</div>
            <button class="btn btn--secondary btn--sm" id="browse-btn" onclick="browseScenes()">
              <img src="../../assets/icons/house.svg" width="13" height="13" alt="" /> Browse HA Scenes
            </button>
          </div>
          <div id="scenes-list" class="w-full"></div>

          <!-- Scene picker panel -->
          <div id="scene-picker" class="hidden w-full mt-2 border border-border rounded-sm overflow-hidden">
            <div class="px-3 py-2 bg-raised border-b border-border flex items-center gap-2">
              <span class="text-[0.82rem] font-semibold flex-1 text-text">Available Scenes</span>
              <button class="btn btn--primary btn--sm" onclick="addSelectedScenes()">+ Add Selected</button>
              <button class="btn btn--secondary btn--sm" onclick="closePicker()" style="padding:0 10px">✕</button>
            </div>
            <div id="picker-list" class="max-h-[220px] overflow-y-auto"></div>
          </div>

          <!-- Manual add fallback -->
          <div class="flex gap-2 pt-2.5 pb-2 flex-wrap w-full">
            <div class="relative flex-shrink-0" id="icon-picker-wrap">
              <button type="button"
                      class="input flex items-center justify-center cursor-pointer select-none"
                      id="icon-btn" style="width:52px"
                      onclick="toggleIconPicker(event)"><img src="../../assets/icons/lightbulb.svg" width="26" height="30" alt="" /></button>
              <input type="hidden" id="new-scene-icon" value="" />
              <div id="icon-dropdown"
                   class="hidden absolute bottom-[calc(100%+6px)] left-0 bg-surface border-[1.5px] border-primary rounded-xs shadow-hover z-50 p-2"
                   style="width:272px">
                <div id="icon-grid" class="grid grid-cols-4 gap-1"></div>
              </div>
            </div>
            <input class="input" id="new-scene-name"  placeholder="Scene name" style="width:130px;flex-shrink:0" />
            <input class="input" id="new-scene-id"    placeholder="scene.entity_id" style="flex:1;min-width:140px" />
            <button class="btn btn--primary btn--sm" onclick="addScene()">+ Add</button>
          </div>
        </div>
      </div>

      <div class="bg-surface rounded-card mb-5 shadow-card border border-border overflow-hidden slide-up mx-6" style="animation-delay:0.16s">
        <div class="px-5 py-4 border-b border-border text-[0.78rem] font-extrabold uppercase tracking-[0.8px] text-muted bg-raised flex items-center justify-between">
          <span>Dashboard Cards</span>
          <span class="text-[0.72rem] font-medium normal-case tracking-normal opacity-60">drag to reorder</span>
        </div>
        <div id="cards-sortable"></div>
      </div>

      <div style="height:16px"></div>
    </div>

    <div class="sticky bottom-0 bg-surface border-t border-border px-5 py-[14px] flex gap-2.5 shadow-[0_-4px_12px_rgba(0,0,0,0.06)] z-20">
      <button class="btn btn--primary flex-1" onclick="save()">
        <img src="../../assets/icons/floppy_save.svg" width="18" height="18" alt="" /> Save Settings
      </button>
      <button class="btn btn--secondary" onclick="window.location.href='../../index.html'">Cancel</button>
    </div>

  </div>

  <div class="fixed bottom-20 left-1/2 -translate-x-1/2 translate-y-5 bg-text text-white px-6 py-3 rounded-full text-[0.9rem] font-semibold opacity-0 pointer-events-none transition-[opacity,transform] duration-[250ms] whitespace-nowrap z-[100] toast"
       id="toast"></div>

  <script src="../../js/utils.js"></script>
  <script>

    let _cfg      = {};
    let _lat      = null;
    let _lon      = null;
    let _cityName = '';
    let _debounce = null;

    const CARD_DEFS = [
      { id: 'weather', label: 'Weather' },
      { id: 'uptime',  label: 'Uptime Monitor' },
      { id: 'server',  label: 'System' },
      { id: 'ha',      label: 'Home Assistant' },
    ];
    const DEFAULT_ORDER = ['weather', 'uptime', 'server', 'ha'];
    let _cardOrder   = [...DEFAULT_ORDER];
    let _cardVisible = { weather: true, uptime: true, server: true, ha: true };
    let _dragSrc     = null;

    function loadCardSettings() {
      const stored = JSON.parse(localStorage.getItem('homedeck_cards') || '{}');
      _cardVisible = {
        weather: stored.weather !== false,
        uptime:  stored.uptime  !== false,
        server:  stored.server  !== false,
        ha:      stored.ha      !== false,
      };
      const storedOrder = stored.order;
      _cardOrder = Array.isArray(storedOrder) &&
                   storedOrder.length === 4 &&
                   DEFAULT_ORDER.every(id => storedOrder.includes(id))
        ? storedOrder
        : [...DEFAULT_ORDER];
      renderCardSettings();
    }

    function renderCardSettings() {
      const container = document.getElementById('cards-sortable');
      container.innerHTML = _cardOrder.map((id, i) => {
        const def    = CARD_DEFS.find(d => d.id === id);
        const isLast = i === _cardOrder.length - 1;
        return `
          <div class="card-sort-row flex items-center gap-4 px-5 py-[14px] transition-opacity duration-[180ms] ${isLast ? '' : 'border-b border-[var(--border)]'}"
               draggable="true" data-card-id="${id}">
            <div class="text-[1.3rem] text-muted flex-shrink-0 cursor-grab select-none leading-none" title="Drag to reorder">⠿</div>
            <div class="flex-1 text-[0.92rem] font-semibold text-text">${def.label}</div>
            <label class="relative inline-block w-11 h-6 flex-shrink-0 cursor-pointer">
              <input type="checkbox" class="opacity-0 w-0 h-0" data-card-id="${id}" ${_cardVisible[id] ? 'checked' : ''} />
              <span class="toggle-slider absolute inset-0 bg-border rounded-full transition-colors duration-[180ms]"></span>
            </label>
          </div>`;
      }).join('');

      container.querySelectorAll('.card-sort-row').forEach(row => {
        row.addEventListener('dragstart', onDragStart);
        row.addEventListener('dragover',  onDragOver);
        row.addEventListener('dragleave', onDragLeave);
        row.addEventListener('drop',      onDrop);
        row.addEventListener('dragend',   onDragEnd);
      });
    }

    function onDragStart(e) {
      _dragSrc = this;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => this.style.opacity = '0.35', 0);
    }
    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (this !== _dragSrc) this.classList.add('drag-over');
    }
    function onDragLeave() {
      this.classList.remove('drag-over');
    }
    function onDrop(e) {
      e.stopPropagation();
      this.classList.remove('drag-over');
      if (_dragSrc === this) return;
      document.querySelectorAll('#cards-sortable input[data-card-id]').forEach(cb => {
        _cardVisible[cb.dataset.cardId] = cb.checked;
      });
      const srcId  = _dragSrc.dataset.cardId;
      const destId = this.dataset.cardId;
      const si = _cardOrder.indexOf(srcId);
      const di = _cardOrder.indexOf(destId);
      _cardOrder.splice(si, 1);
      _cardOrder.splice(di, 0, srcId);
      renderCardSettings();
    }
    function onDragEnd() {
      this.style.opacity = '1';
      document.querySelectorAll('.card-sort-row').forEach(r => r.classList.remove('drag-over'));
    }

    function saveCardSettings() {
      document.querySelectorAll('#cards-sortable input[data-card-id]').forEach(cb => {
        _cardVisible[cb.dataset.cardId] = cb.checked;
      });
      localStorage.setItem('homedeck_cards', JSON.stringify({
        order:   _cardOrder,
        weather: _cardVisible.weather,
        uptime:  _cardVisible.uptime,
        server:  _cardVisible.server,
        ha:      _cardVisible.ha,
      }));
    }

    async function init() {
      const data = await fetchAPI('/api/config');
      if (!data) {
        showToast('Could not load config', true);
        return;
      }
      _cfg = data;

      const w = data.weather || {};
      _lat      = w.latitude;
      _lon      = w.longitude;
      _cityName = w.location_name || '';
      if (_cityName) showCityChip(_cityName, _lat, _lon);

      setActiveToggle('unit-toggle', w.units      || 'fahrenheit');
      setActiveToggle('wind-toggle', w.wind_unit  || 'mph');

      renderChecks((data.uptime || {}).checks || []);

      const ha = data.homeassistant || {};
      document.getElementById('ha-url').value   = ha.url   || '';
      document.getElementById('ha-token').value = ha.token || '';
      renderScenes(ha.scenes || []);

      loadCardSettings();
    }

    function onCityInput() {
      clearTimeout(_debounce);
      const q = document.getElementById('city-input').value.trim();
      if (q.length < 2) {
        closeCityDropdown();
        return;
      }
      _debounce = setTimeout(() => searchCity(q), 400);
    }

    async function searchCity(q) {
      const data = await fetchAPI(`/api/geocode?q=${encodeURIComponent(q)}`);
      const results = data?.results || [];
      const box = document.getElementById('city-results');

      if (!results.length) {
        closeCityDropdown();
        return;
      }

      box.innerHTML = results.map(r => `
        <div class="city-result-item px-[14px] py-3 cursor-pointer text-[0.9rem] border-b border-[var(--border)] last:border-b-0 transition-colors duration-[180ms]"
             onclick="selectCity(${r.latitude},${r.longitude},'${escJs(r.display)}')">
          <div>${r.display}</div>
          <div class="text-[0.75rem] text-muted mt-px">${r.latitude.toFixed(4)}, ${r.longitude.toFixed(4)}</div>
        </div>`).join('');
      box.classList.add('open');
    }

    function selectCity(lat, lon, name) {
      _lat      = lat;
      _lon      = lon;
      _cityName = name;
      document.getElementById('city-input').value = '';
      closeCityDropdown();
      showCityChip(name, lat, lon);
    }

    function showCityChip(name, lat, lon) {
      const chip = document.getElementById('city-chip');
      chip.style.display = 'inline-flex';
      chip.textContent = `✓ ${name}`;
      if (lat != null) chip.title = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
    }

    function closeCityDropdown() {
      document.getElementById('city-results').classList.remove('open');
    }


    function setActiveToggle(groupId, value) {
      document.querySelectorAll(`#${groupId} .toggle-opt`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.val === value);
      });
    }

    function setUnit(btn) {
      document.querySelectorAll('#unit-toggle .toggle-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function setWind(btn) {
      document.querySelectorAll('#wind-toggle .toggle-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function getToggleVal(groupId) {
      return document.querySelector(`#${groupId} .toggle-opt.active`)?.dataset.val || null;
    }


    let _checks = [];

    function renderChecks(list) {
      _checks = list;
      const el = document.getElementById('checks-list');
      if (!list.length) {
        el.innerHTML = `<div class="px-5 py-3 text-muted text-[0.88rem]">No services yet.</div>`;
        return;
      }
      el.innerHTML = list.map((c, i) => `
        <div class="flex items-center gap-2.5 px-5 py-2.5 border-b border-[var(--border)]">
          <div class="text-[0.9rem] font-semibold min-w-[120px]">${escHtml(c.name)}</div>
          <div class="text-[0.8rem] text-muted flex-1 overflow-hidden text-ellipsis whitespace-nowrap">${escHtml(c.url)}</div>
          <button class="btn btn--danger btn--sm btn--icon"
                  onclick="removeCheck(${i})" title="Remove"><img src="../../assets/icons/trash.svg" width="14" height="14" alt="Remove" /></button>
        </div>`).join('');
    }

    function addCheck() {
      const name = document.getElementById('new-check-name').value.trim();
      const url  = document.getElementById('new-check-url').value.trim();
      if (!name || !url) return;
      _checks = [..._checks, { name, url }];
      renderChecks(_checks);
      document.getElementById('new-check-name').value = '';
      document.getElementById('new-check-url').value  = '';
    }

    function removeCheck(i) {
      _checks = _checks.filter((_, idx) => idx !== i);
      renderChecks(_checks);
    }

    let _scenes = [];

    function renderScenes(list) {
      _scenes = list;
      const el = document.getElementById('scenes-list');
      if (!list.length) {
        el.innerHTML = `<div class="text-muted text-[0.88rem] py-2">No scenes yet.</div>`;
        return;
      }
      el.innerHTML = list.map((s, i) => `
        <div class="flex items-center gap-2.5 py-2.5 border-b border-[var(--border)]">
          <div class="w-8 flex items-center justify-center flex-shrink-0">${iconHtml(s.icon)}</div>
          <div class="flex-1">
            <div class="font-semibold text-[0.9rem]">${escHtml(s.name)}</div>
            <div class="text-[0.78rem] text-muted">${escHtml(s.entity_id)}</div>
          </div>
          <button class="btn btn--danger btn--sm btn--icon"
                  onclick="removeScene(${i})" title="Remove"><img src="../../assets/icons/trash.svg" width="14" height="14" alt="Remove" /></button>
        </div>`).join('');
    }

    function addScene() {
      const icon = document.getElementById('new-scene-icon').value.trim();
      const name = document.getElementById('new-scene-name').value.trim();
      const id   = document.getElementById('new-scene-id').value.trim();
      if (!name || !id) return;
      _scenes = [..._scenes, { icon, name, entity_id: id }];
      renderScenes(_scenes);
      document.getElementById('new-scene-icon').value  = '';
      document.getElementById('icon-btn').innerHTML    = '<img src="../../assets/icons/lightbulb.svg" width="26" height="26" alt="" />';
      document.getElementById('new-scene-name').value = '';
      document.getElementById('new-scene-id').value   = '';
    }

    function removeScene(i) {
      _scenes = _scenes.filter((_, idx) => idx !== i);
      renderScenes(_scenes);
    }

    // SVG filenames — existing ones load immediately, new ones show faded until you drop the file in assets/icons/
    const SCENE_ICONS = [
      'lightbulb.svg',   'moon.svg',        'sun.svg',           'house.svg',
      'movie.svg',       'music.svg',       'couch.svg',         'eu_socket.svg',   
      'monitor.svg',     'bed.svg',         'book.svg',          'candle.svg',      
      'gaming.svg',      'plant.svg',       'shower.svg',        'cooking.svg',
      'sunrise.svg',
      
    ];

    function iconHtml(icon, size = 28) {
      if (!icon) return `<img src="../../assets/icons/lightbulb.svg" width="${size}" height="${size}" alt="" />`;
      if (icon.endsWith('.svg')) return `<img src="../../assets/icons/${icon}" width="${size}" height="${size}" alt="" />`;
      return icon; // legacy emoji fallback
    }

    document.getElementById('icon-grid').innerHTML = SCENE_ICONS.map(ic =>
      `<button type="button"
               class="w-[62px] h-[62px] rounded-xs hover:bg-bg transition-colors duration-[120ms] border-none bg-transparent cursor-pointer flex items-center justify-center"
               onclick="selectIcon('${ic}')">
         <img src="../../assets/icons/${ic}" width="36" height="36" alt="" onerror="this.style.opacity='0.2'" />
       </button>`
    ).join('');

    function toggleIconPicker(e) {
      e.stopPropagation();
      document.getElementById('icon-dropdown').classList.toggle('hidden');
    }

    function selectIcon(icon) {
      document.getElementById('icon-btn').innerHTML = `<img src="../../assets/icons/${icon}" width="26" height="26" alt="" />`;
      document.getElementById('new-scene-icon').value = icon;
      document.getElementById('icon-dropdown').classList.add('hidden');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('#icon-picker-wrap'))
        document.getElementById('icon-dropdown')?.classList.add('hidden');
      if (!e.target.closest('.city-search-wrap') && !e.target.closest('#city-results'))
        closeCityDropdown();
    });

    let _haScenes = [];

    async function browseScenes() {
      const btn        = document.getElementById('browse-btn');
      const picker     = document.getElementById('scene-picker');
      const pickerList = document.getElementById('picker-list');

      // If already open, just close
      if (!picker.classList.contains('hidden')) {
        closePicker();
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Loading…';

      const haUrl   = document.getElementById('ha-url').value.trim();
      const haToken = document.getElementById('ha-token').value.trim();

      if (!haUrl || !haToken) {
        showToast('<img src="../../assets/icons/x_mark.svg" width="14" height="14" alt="" /> Enter HA URL and token first', true);
        btn.disabled    = false;
        btn.innerHTML   = '<img src="../../assets/icons/house.svg" width="13" height="13" alt="" /> Browse HA Scenes';
        return;
      }

      // Save URL+token temporarily so the backend can use them
      await fetchAPI('/api/config', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ homeassistant: { url: haUrl, token: haToken } }),
      });

      const data = await fetchAPI('/api/ha/scenes');

      btn.disabled  = false;
      btn.innerHTML = '<img src="../../assets/icons/house.svg" width="13" height="13" alt="" /> Browse HA Scenes';

      if (!data?.ok) {
        showToast(`<img src="../../assets/icons/x_mark.svg" width="14" height="14" alt="" /> ${data?.error || 'Could not fetch scenes'}`, true);
        return;
      }

      _haScenes = data.scenes || [];

      if (!_haScenes.length) {
        showToast('No scenes found in Home Assistant');
        return;
      }

      pickerList.innerHTML = _haScenes.map((s, i) => {
        const added = _scenes.some(x => x.entity_id === s.entity_id);
        return `
          <label class="flex items-center gap-3 px-4 py-2.5 border-b border-[var(--border)] last:border-b-0 cursor-pointer transition-colors duration-[150ms] ${added ? 'opacity-50 cursor-default' : 'hover:bg-bg'}">
            <input type="checkbox" class="w-4 h-4 flex-shrink-0" data-idx="${i}" ${added ? 'checked disabled' : ''} />
            <div class="min-w-0">
              <div class="text-[0.88rem] font-semibold text-text truncate">${escHtml(s.name)}</div>
              <div class="text-[0.75rem] text-muted truncate">${escHtml(s.entity_id)}</div>
            </div>
          </label>`;
      }).join('');

      picker.classList.remove('hidden');
    }

    function closePicker() {
      document.getElementById('scene-picker').classList.add('hidden');
    }

    function addSelectedScenes() {
      const checkboxes = document.querySelectorAll('#picker-list input[type=checkbox]:not(:disabled):checked');
      checkboxes.forEach(cb => {
        const s = _haScenes[parseInt(cb.dataset.idx)];
        if (s && !_scenes.some(x => x.entity_id === s.entity_id)) {
          _scenes.push({ name: s.name, entity_id: s.entity_id, icon: '' });
        }
      });
      renderScenes(_scenes);
      closePicker();
    }

    async function save() {
      saveCardSettings();

      const payload = {
        weather: {
          latitude:      _lat      ?? _cfg.weather?.latitude,
          longitude:     _lon      ?? _cfg.weather?.longitude,
          location_name: _cityName || _cfg.weather?.location_name,
          units:         getToggleVal('unit-toggle'),
          wind_unit:     getToggleVal('wind-toggle'),
        },
        uptime: { checks: _checks },
        homeassistant: {
          url:    document.getElementById('ha-url').value.trim(),
          token:  document.getElementById('ha-token').value.trim(),
          scenes: _scenes,
        },
      };

      const result = await fetchAPI('/api/config', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });

      if (result?.ok) {
        showToast('<img src="../../assets/icons/check_mark.svg" width="14" height="14" alt="" /> Settings saved!');
        setTimeout(() => window.location.href = '../../index.html', 1400);
      } else {
        showToast('<img src="../../assets/icons/x_mark.svg" width="14" height="14" alt="" /> Failed to save', true);
      }
    }

    function showToast(msg, isErr = false) {
      const t = document.getElementById('toast');
      t.innerHTML = msg;
      t.style.background = isErr ? 'var(--error)' : 'var(--text)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escJs(s) {
      return String(s).replace(/'/g,"\\'");
    }

    init();
  </script>
</body>
</html>
