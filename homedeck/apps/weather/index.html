<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Weather - HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      'var(--bg)',
            surface: 'var(--surface)',
            text:    'var(--text)',
            muted:   'var(--text-secondary)',
            border:  'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden">

    <header class="flex items-center px-6 py-[10px] bg-surface border-b border-border shadow-app gap-[14px] flex-shrink-0 z-10">
      <button class="w-11 h-11 min-w-[44px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.4rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <img src="../../assets/icons/cloud_with_sun.svg" width="24" height="24" />
      <span class="text-[1.45rem] font-bold text-text"> Weather</span>
      <button class="btn btn--secondary btn--sm ml-auto" onclick="load()" id="refresh-btn">↻</button>
    </header>

    <div class="flex-1 overflow-y-auto p-4">

      <!-- Hero: 2-column — weather left, outfit right -->
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="bg-surface rounded-card px-5 py-3 border border-border shadow-card slide-up">
          <div class="flex items-center gap-3 mb-2">
            <div id="w-icon" class="flex-shrink-0"></div>
            <div id="w-temp" class="text-[3rem] font-bold leading-none">--°</div>
          </div>
          <div id="w-cond" class="text-[1rem] text-muted">Loading…</div>
          <div id="w-loc" class="text-[0.82rem] text-muted mt-0.5 truncate"></div>
        </div>
        <div class="bg-surface rounded-card px-5 py-3 border border-border shadow-card flex flex-col items-center justify-center gap-2 slide-up">
          <div id="w-outfit"></div>
          <div id="w-outfit-label" class="text-[1rem] font-semibold text-text text-center leading-snug"></div>
          <div id="w-outfit-extra" class="text-[0.72rem] text-muted text-center leading-tight hidden"></div>
        </div>
      </div>

      <!-- Stats: 3 columns — humidity, wind, feels like -->
      <div class="grid grid-cols-3 gap-3 mb-3">
        <div class="bg-surface rounded-sm px-3 py-2 shadow-card border border-border flex items-center gap-3 slide-up">
          <img src="../../assets/icons/humidity.svg" width="28" height="28" alt="" class="flex-shrink-0" />
          <div>
            <div id="w-hum" class="text-[1.2rem] font-bold leading-none">--%</div>
            <div class="text-[0.68rem] text-muted uppercase tracking-[0.4px]">Humidity</div>
          </div>
        </div>
        <div class="bg-surface rounded-sm px-3 py-2 shadow-card border border-border flex items-center gap-3 slide-up">
          <img src="../../assets/icons/windy.svg" width="28" height="28" alt="" class="flex-shrink-0" />
          <div>
            <div id="w-wind" class="text-[1.2rem] font-bold leading-none">--</div>
            <div class="text-[0.68rem] text-muted uppercase tracking-[0.4px]">Wind</div>
          </div>
        </div>
        <div class="bg-surface rounded-sm px-3 py-2 shadow-card border border-border flex items-center gap-3 slide-up">
          <img src="../../assets/icons/thermometer.svg" width="28" height="28" alt="" class="flex-shrink-0" />
          <div>
            <div id="w-feels" class="text-[1.2rem] font-bold leading-none">--°</div>
            <div class="text-[0.68rem] text-muted uppercase tracking-[0.4px]">Feels Like</div>
          </div>
        </div>
      </div>

      <!-- Forecast: hourly pill (60%) + daily column (40%) -->
      <div class="flex gap-3 items-start">

        <!-- Hourly scrollable pill -->
        <div style="width:60%;flex-shrink:0">
          <div class="text-[0.82rem] font-bold uppercase tracking-[0.8px] text-muted mb-2">Hourly</div>
          <div class="bg-surface rounded-card border border-border shadow-card flex overflow-x-auto"
               id="forecast-hourly-pill"
               style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
            <div class="text-muted py-4 px-4 text-sm">Loading…</div>
          </div>
        </div>

        <!-- Daily forecast column -->
        <div class="flex-1 min-w-0">
          <div class="text-[0.82rem] font-bold uppercase tracking-[0.8px] text-muted mb-2">Next Days</div>
          <div id="forecast-daily-wrap" class="flex flex-col gap-2">
            <div class="text-muted text-sm py-2">Loading…</div>
          </div>
        </div>

      </div>

      <div class="text-[0.75rem] text-muted text-center mt-3 pb-2" id="last-updated"></div>

    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script>
    function getOutfitHint(feelsLike, unit, forecast) {
      const toC = t => unit === '°F' ? (t - 32) * 5 / 9 : t;

      function getTier(c) {
        if (c < 0)  return { icon: 'winterjacket_and_glove.svg', label: 'Heavy coat & gloves', bring: 'Heavy coat', tier: 0 };
        if (c < 5)  return { icon: 'winterjacket.svg',           label: 'Coat',                bring: 'Coat',        tier: 1 };
        if (c < 10) return { icon: 'glove.svg',                  label: 'Cold — wear gloves',  bring: 'Gloves',      tier: 2 };
        if (c < 15) return { icon: 'lightjacket.svg',            label: 'Light jacket',        bring: 'Light jacket',tier: 3 };
        if (c < 20) return { icon: 'longsleeve.svg',             label: 'Long sleeves',        bring: 'Long sleeves',tier: 4 };
        if (c < 25) return { icon: 'tshirt.svg',                 label: 'T-shirt',             bring: 'T-shirt',     tier: 5 };
        if (c < 30) return { icon: 'tshirt_and_shorts.svg',      label: 'Shorts & tee',        bring: 'Shorts',      tier: 6 };
        return             { icon: 'sun_and_shorts.svg',         label: 'Stay cool!',          bring: 'Light layers',tier: 7 };
      }

      const toTime = h => { const d = new Date(h.time), hh = d.getHours(); return hh === 0 ? '12am' : hh < 12 ? `${hh}am` : hh === 12 ? '12pm' : `${hh - 12}pm`; };

      const current = getTier(toC(feelsLike));
      const hints = [];

      if (forecast && forecast.length > 1) {
        const next8 = forecast.slice(1, 9);

        let coldestTier = current.tier;
        let coldestHour = null;
        for (const h of next8) {
          const tier = getTier(toC(h.temp));
          if (tier.tier < coldestTier) { coldestTier = tier.tier; coldestHour = h; }
        }
        if (coldestHour) hints.push(`→ ${getTier(coldestTier).bring} by ${toTime(coldestHour)}`);

        const rainHour = next8.find(h => (h.precip_chance || 0) >= 40);
        if (rainHour) hints.push(`☔ Rain at ${toTime(rainHour)}`);
      }

      return { ...current, extra: hints.length ? hints.join(' · ') : null };
    }

    async function load() {
      const data = await fetchAPI('/api/weather');

      if (!data || data.error) {
        document.getElementById('w-cond').textContent = 'Weather unavailable';
        document.getElementById('w-icon').innerHTML = '<img src="../../assets/icons/x_mark.svg" width="56" height="56" alt="" />';
        return;
      }

      const unit = data.unit || '°C';

      document.getElementById('w-icon').innerHTML  = `<img src="../../assets/icons/${data.icon}" width="48" height="48" alt="" />`;
      document.getElementById('w-temp').textContent  = `${data.temperature}${unit}`;
      document.getElementById('w-cond').textContent  = data.condition;
      document.getElementById('w-loc').textContent   = data.location;
      document.getElementById('w-feels').textContent = `${data.feels_like}${unit}`;
      const outfit = getOutfitHint(data.feels_like, unit, data.forecast);
      document.getElementById('w-outfit').innerHTML = `<img src="../../assets/icons/${outfit.icon}" width="64" height="64" alt="${outfit.label}" class="mx-auto" />`;
      document.getElementById('w-outfit-label').textContent = outfit.label;
      const extraEl = document.getElementById('w-outfit-extra');
      if (outfit.extra) { extraEl.textContent = outfit.extra; extraEl.classList.remove('hidden'); }
      else { extraEl.textContent = ''; extraEl.classList.add('hidden'); }
      document.getElementById('w-hum').textContent   = `${data.humidity}%`;
      document.getElementById('w-wind').textContent  = `${data.wind_speed} ${data.wind_unit || 'mph'}`;

      const hourlyPill = document.getElementById('forecast-hourly-pill');
      const dailyWrap  = document.getElementById('forecast-daily-wrap');

      if (!data.forecast || !data.forecast.length) {
        hourlyPill.innerHTML = '<div class="text-muted py-4 px-4 text-sm">No data</div>';
        dailyWrap.innerHTML  = '<div class="text-muted text-sm py-2">No data</div>';
        return;
      }

      // Hourly pill — items with dividers
      const hourlyItems = data.forecast.flatMap((h, i) => {
        const d     = new Date(h.time);
        const hh    = d.getHours();
        const label = hh === 0 ? '12am' : hh < 12 ? `${hh}am` : hh === 12 ? '12pm' : `${hh - 12}pm`;
        const isNow = i === 0;
        const divider = i > 0 ? `<div style="width:1px;background:var(--border);flex-shrink:0;margin:8px 0"></div>` : '';
        return [divider, `
          <div class="forecast-hour flex-shrink-0 px-3 py-3 text-center ${isNow ? 'now' : ''}" style="min-width:64px">
            <div class="text-[0.78rem] text-muted font-medium">${isNow ? 'Now' : label}</div>
            <div class="my-1.5"><img src="../../assets/icons/${h.icon}" width="26" height="26" alt="" class="mx-auto" /></div>
            <div class="text-[0.95rem] font-bold">${h.temp}${unit}</div>
            ${h.precip_chance > 0 ? `<div class="text-[0.7rem] text-muted mt-0.5 flex items-center justify-center gap-0.5"><img src="../../assets/icons/umbrella.svg" width="10" height="10" alt="" /> ${h.precip_chance}%</div>` : ''}
          </div>`];
      });
      hourlyPill.innerHTML = hourlyItems.join('');

      // Daily forecast — tomorrow featured, rest smaller
      const daily = data.daily_forecast || [];
      const tomorrow = daily[0];
      const rest = daily.slice(1);

      const tomorrowCard = tomorrow ? `
        <div class="bg-surface rounded-card border-2 border-border shadow-card px-3 py-3 flex items-center gap-3">
          <img src="../../assets/icons/${tomorrow.icon}" width="42" height="42" alt="" class="flex-shrink-0" />
          <div class="flex-1 min-w-0">
            <div class="text-[0.82rem] font-bold text-text">Tomorrow</div>
            <div class="text-[1.15rem] font-bold leading-tight">${tomorrow.high}${unit} <span class="text-[0.8rem] text-muted font-normal">${tomorrow.low}${unit}</span></div>
            ${tomorrow.precip_chance > 0 ? `<div class="text-[0.7rem] text-muted flex items-center gap-0.5 mt-0.5"><img src="../../assets/icons/umbrella.svg" width="10" height="10" alt="" /> ${tomorrow.precip_chance}%</div>` : ''}
          </div>
        </div>` : '';

      const restCards = rest.map(d => `
        <div class="bg-surface rounded-sm border border-border shadow-card px-3 py-2 flex items-center gap-2">
          <img src="../../assets/icons/${d.icon}" width="26" height="26" alt="" class="flex-shrink-0" />
          <div class="flex-1 min-w-0">
            <div class="text-[0.75rem] text-muted">${d.day}</div>
            <div class="text-[0.9rem] font-bold leading-tight">${d.high}${unit} <span class="text-[0.72rem] text-muted font-normal">${d.low}${unit}</span></div>
          </div>
          ${d.precip_chance > 0 ? `<div class="text-[0.7rem] text-muted flex items-center gap-0.5"><img src="../../assets/icons/umbrella.svg" width="10" height="10" alt="" /> ${d.precip_chance}%</div>` : ''}
        </div>`).join('');

      dailyWrap.innerHTML = tomorrowCard + restCards;

      setLastUpdated('last-updated', new Date());
    }

    load();
    setInterval(load, 300_000);
  </script>
</body>
</html>
