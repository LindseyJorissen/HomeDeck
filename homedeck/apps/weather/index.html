<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Weather - HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      'var(--bg)',
            surface: 'var(--surface)',
            text:    'var(--text)',
            muted:   'var(--text-secondary)',
            border:  'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden">

    <header class="flex items-center px-6 py-[14px] bg-surface border-b border-border shadow-app gap-[14px] flex-shrink-0 z-10">
      <button class="w-11 h-11 min-w-[44px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.4rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <img src="../../assets/icons/cloud_with_sun.svg" width="24" height="24" />
      <span class="text-[1.45rem] font-bold text-text"> Weather</span>
      <button class="btn btn--secondary btn--sm ml-auto" onclick="load()" id="refresh-btn">↻</button>
    </header>

    <div class="flex-1 overflow-y-auto p-6">

      <div id="hero" class="bg-surface rounded-card px-7 py-5 text-text text-center mb-[18px] border border-border shadow-card slide-up">
        <div id="w-icon" class="text-[5rem] leading-none "></div>
        <div id="w-temp" class="text-[5.5rem] font-bold leading-none mt-1.5">--°</div>
        <div id="w-cond" class="text-[1.4rem] text-muted mt-1">Loading weather…</div>
        <div id="w-loc" class="text-[0.9rem] text-muted mt-1.5"></div>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-[22px]">
        <div class="col-span-2 bg-surface rounded-sm px-4 py-4 shadow-card border border-border slide-up flex items-center gap-4">
          <div class="flex flex-col items-center flex-shrink-0 w-[38%]">
            <img src="../../assets/icons/thermometer.svg" width="24" height="24" alt="" />
            <div id="w-feels" class="text-[2rem] font-bold mt-1 leading-none">--°</div>
            <div class="text-[0.73rem] text-muted uppercase tracking-[0.4px] mt-1">Feels Like</div>
          </div>
          <div class="w-px self-stretch bg-border flex-shrink-0"></div>
          <div class="flex flex-col items-center flex-1 min-w-0">
            <div id="w-outfit" title=""></div>
            <div id="w-outfit-label" class="text-[0.75rem] text-muted leading-tight text-center mt-1.5"></div>
            <div id="w-outfit-extra" class="text-[0.65rem] text-muted leading-tight text-center mt-1 hidden"></div>
          </div>
        </div>
        <div class="flex flex-col gap-3">
          <div class="bg-surface rounded-sm px-3 py-6 shadow-card border border-border slide-up flex-1 flex items-center justify-center gap-3">
            <img src="../../assets/icons/humidity.svg" width="42" height="42" alt="" class="flex-shrink-0" />
            <div>
              <div id="w-hum" class="text-[1rem] font-bold leading-none">--%</div>
              <div class="text-[0.65rem] text-muted uppercase tracking-[0.4px] mt-0.5">Humidity</div>
            </div>
          </div>
          <div class="bg-surface rounded-sm px-3 py-6 shadow-card border border-border slide-up flex-1 flex items-center justify-center gap-3">
            <img src="../../assets/icons/windy.svg" width="42" height="42" alt="" class="flex-shrink-0" />
            <div>
              <div id="w-wind" class="text-[1rem] font-bold leading-none">--</div>
              <div class="text-[0.65rem] text-muted uppercase tracking-[0.4px] mt-0.5">Wind</div>
            </div>
          </div>
        </div>
      </div>

      <div class="text-[0.77rem] font-bold uppercase tracking-[0.8px] text-muted mb-3">Hourly Forecast</div>
      <div class="forecast-scroll flex gap-2.5 flex-wrap" id="forecast">
        <div class="text-muted py-5">Loading…</div>
      </div>

      <div class="text-[0.77rem] font-bold uppercase tracking-[0.8px] text-muted mb-3 mt-6">7-Day Forecast</div>
      <div class="flex gap-2.5 flex-wrap" id="daily-forecast">
        <div class="text-muted py-5">Loading…</div>
      </div>

      <div class="text-[0.75rem] text-muted text-center mt-3 pb-2" id="last-updated"></div>

    </div>
  </div>

  <script src="../../js/utils.js"></script>
  <script>
    function getOutfitHint(feelsLike, unit, forecast) {
      const toC = t => unit === '°F' ? (t - 32) * 5 / 9 : t;

      function getTier(c) {
        if (c < 0)  return { icon: 'winterjacket_and_glove.svg', label: 'Heavy coat & gloves', bring: 'Heavy coat', tier: 0 };
        if (c < 5)  return { icon: 'winterjacket.svg',           label: 'Coat',                bring: 'Coat',        tier: 1 };
        if (c < 10) return { icon: 'glove.svg',                  label: 'Cold — wear gloves',  bring: 'Gloves',      tier: 2 };
        if (c < 15) return { icon: 'lightjacket.svg',            label: 'Light jacket',        bring: 'Light jacket',tier: 3 };
        if (c < 20) return { icon: 'longsleeve.svg',             label: 'Long sleeves',        bring: 'Long sleeves',tier: 4 };
        if (c < 25) return { icon: 'tshirt.svg',                 label: 'T-shirt',             bring: 'T-shirt',     tier: 5 };
        if (c < 30) return { icon: 'tshirt_and_shorts.svg',      label: 'Shorts & tee',        bring: 'Shorts',      tier: 6 };
        return             { icon: 'sun_and_shorts.svg',         label: 'Stay cool!',          bring: 'Light layers',tier: 7 };
      }

      const toTime = h => { const d = new Date(h.time), hh = d.getHours(); return hh === 0 ? '12am' : hh < 12 ? `${hh}am` : hh === 12 ? '12pm' : `${hh - 12}pm`; };

      const current = getTier(toC(feelsLike));
      const hints = [];

      if (forecast && forecast.length > 1) {
        const next8 = forecast.slice(1, 9);

        // colder tier coming?
        let coldestTier = current.tier;
        let coldestHour = null;
        for (const h of next8) {
          const tier = getTier(toC(h.temp));
          if (tier.tier < coldestTier) { coldestTier = tier.tier; coldestHour = h; }
        }
        if (coldestHour) hints.push(`→ ${getTier(coldestTier).bring} by ${toTime(coldestHour)}`);

        // rain coming?
        const rainHour = next8.find(h => (h.precip_chance || 0) >= 40);
        if (rainHour) hints.push(`☔ Rain at ${toTime(rainHour)}`);
      }

      return { ...current, extra: hints.length ? hints.join(' · ') : null };
    }

    async function load() {
      const data = await fetchAPI('/api/weather');

      if (!data || data.error) {
        document.getElementById('w-cond').textContent = 'Weather unavailable';
        document.getElementById('w-icon').innerHTML = '<img src="../../assets/icons/x_mark.svg" width="64" height="64" alt="" />';
        return;
      }

      const unit = data.unit || '°C';

      document.getElementById('w-icon').innerHTML  = `<img src="../../assets/icons/${data.icon}" width="64" height="64" alt="" />`;
      document.getElementById('w-temp').textContent  = `${data.temperature}${unit}`;
      document.getElementById('w-cond').textContent  = data.condition;
      document.getElementById('w-loc').textContent   = data.location;
      document.getElementById('w-feels').textContent = `${data.feels_like}${unit}`;
      const outfit = getOutfitHint(data.feels_like, unit, data.forecast);
      document.getElementById('w-outfit').innerHTML = `<img src="../../assets/icons/${outfit.icon}" width="48" height="48" alt="${outfit.label}" class="mx-auto" />`;
      document.getElementById('w-outfit').title = outfit.label;
      document.getElementById('w-outfit-label').textContent = outfit.label;
      const extraEl = document.getElementById('w-outfit-extra');
      if (outfit.extra) { extraEl.textContent = outfit.extra; extraEl.classList.remove('hidden'); }
      else { extraEl.textContent = ''; extraEl.classList.add('hidden'); }
      document.getElementById('w-hum').textContent   = `${data.humidity}%`;
      document.getElementById('w-wind').textContent  = `${data.wind_speed} ${data.wind_unit || 'mph'}`;

      const fc = document.getElementById('forecast');
      if (!data.forecast || !data.forecast.length) {
        fc.innerHTML = '<div class="text-muted py-5">No forecast data</div>';
        return;
      }

      fc.innerHTML = data.forecast.map((h, i) => {
        const d     = new Date(h.time);
        const hh    = d.getHours();
        const label = hh === 0 ? '12am'
                    : hh < 12  ? `${hh}am`
                    : hh === 12? '12pm'
                    : `${hh - 12}pm`;
        const isNow = i === 0;

        return `
          <div class="forecast-hour bg-surface rounded-sm px-[14px] py-[14px] text-center flex-1 min-w-[72px] shadow-card border border-border slide-up ${isNow ? 'now' : ''}"
               style="animation-delay:${i*0.04}s">
            <div class="text-[0.75rem] text-muted font-medium">${isNow ? 'Now' : label}</div>
            <div class="my-1.5"><img src="../../assets/icons/${h.icon}" width="24" height="24" alt="" class="mx-auto" /></div>
            <div class="text-[1rem] font-bold">${h.temp}${unit}</div>
            ${h.precip_chance > 0 ? `<div class="text-[0.7rem] text-muted mt-0.5 flex items-center justify-center gap-0.5"><img src="../../assets/icons/humidity.svg" width="12" height="12" alt="" /> ${h.precip_chance}%</div>` : ''}
          </div>`;
      }).join('');

      const df = document.getElementById('daily-forecast');
      if (!data.daily_forecast || !data.daily_forecast.length) {
        df.innerHTML = '<div class="text-muted py-5 text-center text-sm">No daily data</div>';
      } else {
        df.innerHTML = data.daily_forecast.map((d, i) => `
          <div class="flex items-center px-4 py-3 gap-3 ${i < data.daily_forecast.length - 1 ? 'border-b border-border' : ''}">
            <div class="w-[52px] text-[0.85rem] font-semibold text-text flex-shrink-0">${d.day}</div>
            <img src="../../assets/icons/${d.icon}" width="22" height="22" alt="" class="flex-shrink-0" />
            ${d.precip_chance > 0
              ? `<div class="flex items-center gap-0.5 text-[0.72rem] text-muted w-[38px] flex-shrink-0"><img src="../../assets/icons/humidity.svg" width="12" height="12" alt="" />${d.precip_chance}%</div>`
              : `<div class="w-[38px] flex-shrink-0"></div>`}
            <div class="flex-1 flex justify-end items-center gap-2">
              <span class="text-[0.82rem] text-muted">${d.low}${unit}</span>
              <div class="flex-1 max-w-[80px] h-1.5 bg-border rounded-full overflow-hidden"></div>
              <span class="text-[0.9rem] font-bold text-text">${d.high}${unit}</span>
            </div>
          </div>`).join('');
      }

      setLastUpdated('last-updated', new Date());
    }

    load();
    setInterval(load, 300_000);
  </script>
</body>
</html>
