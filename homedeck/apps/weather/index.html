<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Weather - HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      'var(--bg)',
            surface: 'var(--surface)',
            text:    'var(--text)',
            muted:   'var(--text-secondary)',
            border:  'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden relative">

    <!-- Floating back button -->
    <button onclick="window.location.href='../../index.html'"
            class="absolute top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-sm bg-surface border border-border shadow-card transition-all duration-[180ms] hover:bg-bg active:scale-[0.92]">
      <img src="../../assets/back.svg" width="20" height="20" alt="Back" />
    </button>

    <!-- Two-panel layout -->
    <div class="flex h-full overflow-hidden">

      <!-- LEFT SIDEBAR -->
      <div class="flex flex-col items-center justify-between px-4 py-5 border-r border-border bg-surface flex-shrink-0 gap-4" style="width:196px">

        <!-- Weather summary -->
        <div class="flex flex-col items-center text-center gap-1 pt-12">
          <div id="w-icon" class="mb-1"></div>
          <div id="w-temp" class="text-[3rem] font-bold leading-none">--°</div>
          <div id="w-cond" class="text-[0.88rem] text-muted mt-1">Loading…</div>
          <div id="w-loc" class="text-[0.72rem] text-muted mt-0.5 text-center leading-snug"></div>
        </div>

        <!-- Outfit card -->
        <div class="w-full rounded-card border border-border bg-bg px-3 py-3 flex flex-col items-center gap-1.5 text-center slide-up">
          <div id="w-outfit"></div>
          <div id="w-outfit-label" class="text-[0.88rem] font-semibold text-text leading-snug"></div>
          <div id="w-feels-label" class="text-[0.75rem] text-muted hidden">Feels like <span id="w-feels" class="font-semibold text-text"></span></div>
          <div id="w-outfit-extra" class="text-[0.68rem] text-muted leading-tight hidden"></div>
        </div>

        <div class="flex flex-col items-center gap-2">
          <div class="text-[0.65rem] text-muted text-center" id="last-updated"></div>
          <button onclick="load()" class="w-8 h-8 flex items-center justify-center rounded-sm bg-bg border border-border text-muted transition-all duration-[180ms] hover:bg-border active:scale-[0.92]"><img src="../../assets/icons/refresh.svg" width="16" height="16" alt="Refresh" /></button>
        </div>
      </div>

      <!-- RIGHT CONTENT -->
      <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3">

        <!-- Hourly forecast -->
        <div class="slide-up">
          <div class="text-[0.78rem] font-bold uppercase tracking-[0.8px] text-muted mb-2">Hourly forecast</div>
          <div id="forecast-hourly-pill"
               class="bg-surface rounded-card border border-border shadow-card flex overflow-x-auto"
               style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
            <div class="text-muted py-4 px-4 text-sm">Loading…</div>
          </div>
        </div>

        <!-- 7-day forecast -->
        <div class="slide-up">
          <div class="text-[0.78rem] font-bold uppercase tracking-[0.8px] text-muted mb-2">7 day forecast</div>
          <div id="forecast-daily-wrap"
               class="bg-surface rounded-card border border-border shadow-card flex overflow-x-auto"
               style="-webkit-overflow-scrolling:touch;scrollbar-width:none">
            <div class="text-muted py-4 px-4 text-sm">Loading…</div>
          </div>
        </div>

        <!-- Stats row -->
        <div class="grid grid-cols-3 gap-3 slide-up">
          <div class="bg-surface rounded-card px-4 py-3 shadow-card border border-border flex flex-col">
            <div class="text-[0.65rem] text-muted uppercase tracking-[0.4px] mb-1.5">Humidity</div>
            <div class="flex-1 flex items-center">
              <div id="w-hum" class="text-[1.1rem] font-bold leading-none">--%</div>
            </div>
          </div>
          <div class="bg-surface rounded-card px-4 py-3 shadow-card border border-border flex flex-col">
            <div class="text-[0.65rem] text-muted uppercase tracking-[0.4px] mb-1.5">Wind</div>
            <div class="flex-1 flex items-center">
              <div id="w-wind" class="text-[1.1rem] font-bold leading-none">--</div>
            </div>
          </div>
          <div class="bg-surface rounded-card px-4 py-3 shadow-card border border-border flex flex-col">
            <div class="text-[0.65rem] text-muted uppercase tracking-[0.4px] mb-1.5">Sunrise / Sunset</div>
            <div class="flex-1 flex flex-col justify-center gap-1.5">
              <div class="flex items-center gap-1.5">
                <img src="../../assets/icons/sun.svg" width="14" height="14" alt="" />
                <span id="w-sunrise" class="text-[0.85rem] font-bold leading-none">--</span>
                <span class="text-muted mx-1">·</span>
                <img src="../../assets/icons/moon.svg" width="14" height="14" alt="" />
                <span id="w-sunset" class="text-[0.85rem] font-bold leading-none">--</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="../../js/utils.js"></script>
  <script>
    function getOutfitHint(feelsLike, unit, forecast) {
      const toC = t => unit === '°F' ? (t - 32) * 5 / 9 : t;

      function getTier(c) {
        if (c < 0)  return { icon: 'winterjacket_and_glove.svg', label: 'Heavy coat & gloves', bring: 'Heavy coat', tier: 0 };
        if (c < 5)  return { icon: 'winterjacket.svg',           label: 'Coat',                bring: 'Coat',        tier: 1 };
        if (c < 10) return { icon: 'glove.svg',                  label: 'Cold — wear gloves',  bring: 'Gloves',      tier: 2 };
        if (c < 15) return { icon: 'lightjacket.svg',            label: 'Light jacket',        bring: 'Light jacket',tier: 3 };
        if (c < 20) return { icon: 'longsleeve.svg',             label: 'Long sleeves',        bring: 'Long sleeves',tier: 4 };
        if (c < 25) return { icon: 'tshirt.svg',                 label: 'T-shirt',             bring: 'T-shirt',     tier: 5 };
        if (c < 30) return { icon: 'tshirt_and_shorts.svg',      label: 'Shorts & tee',        bring: 'Shorts',      tier: 6 };
        return             { icon: 'sun_and_shorts.svg',         label: 'Stay cool!',          bring: 'Light layers',tier: 7 };
      }

      const toTime = h => { const d = new Date(h.time), hh = d.getHours(); return hh === 0 ? '12am' : hh < 12 ? `${hh}am` : hh === 12 ? '12pm' : `${hh - 12}pm`; };

      const current = getTier(toC(feelsLike));
      const hints = [];

      if (forecast && forecast.length > 1) {
        const next8 = forecast.slice(1, 9);

        let coldestTier = current.tier;
        let coldestHour = null;
        for (const h of next8) {
          const tier = getTier(toC(h.temp));
          if (tier.tier < coldestTier) { coldestTier = tier.tier; coldestHour = h; }
        }
        if (coldestHour) hints.push(`→ ${getTier(coldestTier).bring} by ${toTime(coldestHour)}`);

        const rainHour = next8.find(h => (h.precip_chance || 0) >= 40);
        if (rainHour) hints.push(`<img src="../../assets/icons/umbrella.svg" width="11" height="11" alt="" style="display:inline;vertical-align:middle;margin-right:2px" /> Rain at ${toTime(rainHour)}`);
      }

      return { ...current, extra: hints.length ? hints.join(' · ') : null };
    }

    async function load() {
      const data = await fetchAPI('/api/weather');

      if (!data || data.error) {
        document.getElementById('w-cond').textContent = 'Weather unavailable';
        document.getElementById('w-icon').innerHTML = '<img src="../../assets/icons/x_mark.svg" width="56" height="56" alt="" />';
        return;
      }

      const unit = data.unit || '°C';

      document.getElementById('w-icon').innerHTML  = `<img src="../../assets/icons/${data.icon}" width="56" height="56" alt="" />`;
      document.getElementById('w-temp').textContent  = `${data.temperature}${unit}`;
      document.getElementById('w-cond').textContent  = data.condition;
      document.getElementById('w-loc').textContent   = data.location;
      const outfit = getOutfitHint(data.feels_like, unit, data.forecast);
      document.getElementById('w-outfit').innerHTML = `<img src="../../assets/icons/${outfit.icon}" width="52" height="52" alt="${outfit.label}" class="mx-auto" />`;
      document.getElementById('w-outfit-label').textContent = outfit.label;
      document.getElementById('w-feels').textContent = `${data.feels_like}${unit}`;
      document.getElementById('w-feels-label').classList.remove('hidden');
      const extraEl = document.getElementById('w-outfit-extra');
      if (outfit.extra) { extraEl.innerHTML = outfit.extra; extraEl.classList.remove('hidden'); }
      else { extraEl.innerHTML = ''; extraEl.classList.add('hidden'); }
      document.getElementById('w-hum').textContent   = `${data.humidity}%`;
      document.getElementById('w-wind').textContent  = `${data.wind_speed} ${data.wind_unit || 'mph'}`;
      if (data.sunrise) document.getElementById('w-sunrise').textContent = data.sunrise;
      if (data.sunset)  document.getElementById('w-sunset').textContent  = data.sunset;

      const hourlyPill = document.getElementById('forecast-hourly-pill');
      const dailyWrap  = document.getElementById('forecast-daily-wrap');

      if (!data.forecast || !data.forecast.length) {
        hourlyPill.innerHTML = '<div class="text-muted py-4 px-4 text-sm">No data</div>';
        dailyWrap.innerHTML  = '<div class="text-muted text-sm py-2">No data</div>';
        return;
      }

      // Hourly pill
      const hourlyItems = data.forecast.flatMap((h, i) => {
        const d     = new Date(h.time);
        const hh    = d.getHours();
        const label = hh === 0 ? '12am' : hh < 12 ? `${hh}am` : hh === 12 ? '12pm' : `${hh - 12}pm`;
        const isNow = i === 0;
        const divider = i > 0 ? `<div style="width:1px;background:var(--border);flex-shrink:0;margin:8px 0"></div>` : '';
        return [divider, `
          <div class="forecast-hour flex-shrink-0 px-4 py-3 text-center ${isNow ? 'now' : ''}" style="min-width:88px">
            <div class="text-[0.85rem] text-muted font-medium">${isNow ? 'Now' : label}</div>
            <div class="my-2"><img src="../../assets/icons/${h.icon}" width="32" height="32" alt="" class="mx-auto" /></div>
            <div class="text-[1.05rem] font-bold">${h.temp}${unit}</div>
            ${h.precip_chance > 0 ? `<div class="text-[0.72rem] text-muted mt-1 flex items-center justify-center gap-0.5"><img src="../../assets/icons/umbrella.svg" width="10" height="10" alt="" /> ${h.precip_chance}%</div>` : ''}
          </div>`];
      });
      hourlyPill.innerHTML = hourlyItems.join('');

      // Daily pill
      const daily = data.daily_forecast || [];
      const dailyItems = daily.flatMap((d, i) => {
        const isTomorrow = i === 0;
        const divider = i > 0 ? `<div style="width:1px;background:var(--border);flex-shrink:0;margin:8px 0"></div>` : '';
        const item = `
          <div class="flex-shrink-0 px-4 py-3 text-center" style="min-width:80px">
            <div class="text-[0.85rem] font-medium ${isTomorrow ? 'font-bold text-text' : 'text-muted'}">${isTomorrow ? 'Tomorrow' : d.day}</div>
            <div class="my-2"><img src="../../assets/icons/${d.icon}" width="30" height="30" alt="" class="mx-auto" /></div>
            <div class="text-[1rem] font-bold">${d.high}${unit}</div>
            <div class="text-[0.75rem] text-muted">${d.low}${unit}</div>
            ${d.precip_chance > 0 ? `<div class="text-[0.72rem] text-muted mt-1 flex items-center justify-center gap-0.5"><img src="../../assets/icons/umbrella.svg" width="10" height="10" alt="" /> ${d.precip_chance}%</div>` : ''}
          </div>`;
        return [divider, item];
      });
      dailyWrap.innerHTML = dailyItems.join('');

      setLastUpdated('last-updated', new Date());
    }

    load();
    setInterval(load, 300_000);
  </script>
</body>
</html>
