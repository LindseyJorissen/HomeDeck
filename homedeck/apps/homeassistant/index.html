<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Home Assistant - HomeDeck</title>
  <link rel="stylesheet" href="../../css/styles.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      'var(--bg)',
            surface: 'var(--surface)',
            text:    'var(--text)',
            muted:   'var(--text-secondary)',
            border:  'var(--border)',
          },
          borderRadius: {
            card: 'var(--radius)',
            sm:   'var(--radius-sm)',
            xs:   'var(--radius-xs)',
          },
          boxShadow: {
            app:  'var(--shadow)',
            hover:'var(--shadow-hover)',
            card: 'var(--shadow-card)',
          },
        }
      }
    }
  </script>
</head>
<body>
  <div class="flex flex-col h-screen overflow-hidden">

    <header class="flex items-center px-6 py-[14px] bg-surface border-b border-border shadow-app gap-[14px] flex-shrink-0 z-10">
      <button class="w-11 h-11 min-w-[44px] border-none bg-bg rounded-sm cursor-pointer flex items-center justify-center text-[1.4rem] text-text transition-all duration-[180ms] hover:bg-border active:scale-[0.92] flex-shrink-0"
              onclick="window.location.href='../../index.html'">←</button>
      <span class="text-[1.45rem] font-bold text-text flex items-center gap-2">
        <img src="../../assets/icons/home.svg" width="20" height="20" alt="" /> Home Assistant
      </span>
      <button class="btn btn--secondary btn--sm ml-auto" onclick="load()" id="refresh-btn">↻</button>
    </header>

    <div class="flex-1 overflow-y-auto p-6">
      <div id="ha-banner"></div>
      <div id="scenes-container"></div>
    </div>

  </div>

  <script src="../../js/utils.js"></script>
  <script>
    async function load() {
      const banner    = document.getElementById('ha-banner');
      const container = document.getElementById('scenes-container');

      banner.innerHTML    = '';
      container.innerHTML = '';

      const data = await fetchAPI('/api/ha/status');

      if (!data || (!data.connected && data.error === 'Home Assistant not configured')) {
        banner.innerHTML = `
          <div class="ha-banner ha-banner--cfg flex items-center gap-2.5 px-[18px] py-3 rounded-sm mb-[22px] text-[0.9rem] font-semibold slide-up">
            <img src="../../assets/icons/settings.svg" width="16" height="16" alt="" /> Home Assistant not configured — tap <strong>Settings</strong> to add your HA URL and token.
          </div>`;
        container.innerHTML = `
          <div class="bg-surface rounded-card px-6 py-8 text-center shadow-card border border-border">
            <div class="text-[3rem]"><img src="../../assets/icons/home.svg" width="48" height="48" alt="" class="mx-auto" /></div>
            <div class="text-[1.2rem] font-bold mt-3 mb-1.5">Connect Home Assistant</div>
            <div class="text-[0.88rem] text-muted mb-5 leading-[1.5]">
              Enter your Home Assistant URL and a Long-Lived Access Token in Settings.<br>
              Then add your favourite scenes to activate them from here.
            </div>
            <button class="btn btn--primary" onclick="window.location.href='../settings/index.html'">
              Open Settings
            </button>
          </div>`;
        return;
      }

      if (data.connected) {
        banner.innerHTML = `
          <div class="ha-banner ha-banner--ok flex items-center gap-2.5 px-[18px] py-3 rounded-sm mb-[22px] text-[0.9rem] font-semibold slide-up">
            <img src="../../assets/icons/check.svg" width="16" height="16" alt="" /> Connected to Home Assistant
          </div>`;
      } else {
        banner.innerHTML = `
          <div class="ha-banner ha-banner--err flex items-center gap-2.5 px-[18px] py-3 rounded-sm mb-[22px] text-[0.9rem] font-semibold slide-up">
            <img src="../../assets/icons/warning.svg" width="16" height="16" alt="" /> Could not reach Home Assistant — ${data.error || 'check your URL and token'}
          </div>`;
      }

      const scenes = data.scenes || [];

      if (scenes.length === 0) {
        container.innerHTML = `
          <div class="text-center py-[52px] px-6 text-muted">
            <div class="text-[3rem] mb-[14px]"><img src="../../assets/icons/lightbulb.svg" width="48" height="48" alt="" class="mx-auto" /></div>
            <div class="text-[1.1rem] font-semibold text-text">No scenes configured</div>
            <div class="text-[0.85rem] mt-[5px]">Add scenes in <strong>Settings → Home Assistant</strong></div>
            <div class="mt-4">
              <button class="btn btn--primary" onclick="window.location.href='../settings/index.html'">Open Settings</button>
            </div>
          </div>`;
        return;
      }

      container.innerHTML = `
        <div class="text-[0.77rem] font-bold uppercase tracking-[0.8px] text-muted mb-3">Favourite Scenes</div>
        <div class="grid grid-cols-[repeat(auto-fill,minmax(150px,1fr))] gap-4" id="scenes-grid"></div>`;

      const grid = document.getElementById('scenes-grid');
      grid.innerHTML = scenes.map((s, i) => `
        <div class="scene-card bg-surface rounded-card py-6 px-4 text-center shadow-card border-[1.5px] border-border cursor-pointer transition-[transform,box-shadow,border-color] duration-[180ms] slide-up relative overflow-hidden min-h-[130px] flex flex-col items-center justify-center gap-2.5 select-none hover:-translate-y-1 hover:shadow-hover active:scale-95"
             id="scene-${i}" style="animation-delay:${i * 0.06}s"
             onclick="activateScene('${s.entity_id}', ${i})">
          <div class="scene-icon text-[2.8rem] leading-none transition-transform duration-200">${s.icon || '<img src="../../assets/icons/lightbulb.svg" width="28" height="28" alt="" />'}</div>
          <div class="text-[0.9rem] font-bold text-text leading-[1.3]">${s.name}</div>
          <div class="scene-feedback absolute inset-0 flex items-center justify-center text-[2rem] bg-white/85 rounded-card opacity-0 transition-opacity duration-200 pointer-events-none"
               id="fb-${i}"></div>
        </div>`).join('');
    }

    async function activateScene(entityId, idx) {
      const card = document.getElementById(`scene-${idx}`);
      const fb   = document.getElementById(`fb-${idx}`);

      card.classList.add('loading');
      fb.innerHTML = '<img src="../../assets/icons/hourglass.svg" width="16" height="16" alt="" />';

      const result = await fetchAPI(`/api/ha/scene/${encodeURIComponent(entityId)}`, { method: 'POST' });

      card.classList.remove('loading');

      if (result?.ok) {
        card.classList.add('success');
        fb.innerHTML = '<img src="../../assets/icons/check.svg" width="16" height="16" alt="" />';
        setTimeout(() => {
          card.classList.remove('success');
          fb.textContent = '';
        }, 1800);
      } else {
        card.classList.add('error');
        fb.innerHTML = '<img src="../../assets/icons/warning.svg" width="16" height="16" alt="" />';
        setTimeout(() => {
          card.classList.remove('error');
          fb.textContent = '';
        }, 2500);
      }
    }

    load();
  </script>
</body>
</html>
